<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Marketplace — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 16px;
            --radius-sm: 12px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: var(--navy);
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: var(--navy);
            padding: calc(0.8rem + var(--safe-top)) 2rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--orange); text-decoration: none; min-height: 44px; display: flex; align-items: center; }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem;
            font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 8px;
            transition: transform 0.15s var(--ease-soft),
                        opacity 0.15s var(--ease-soft),
                        background-color 0.15s var(--ease-soft);
            position: relative;
            min-width: 44px; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .nav-links a:active { transform: scale(0.96); opacity: 0.8; background: rgba(255,255,255,0.12); }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-links a.active { color: var(--orange); }
        .btn-nav { background: var(--orange); color: white !important; font-weight: 600; border-radius: 8px; padding: 0.6rem 1.3rem !important; }
        .btn-nav:active { transform: scale(0.96); opacity: 0.85; }
        .btn-nav:hover { background: #e8551f !important; }

        .nav-badge {
            position: absolute; top: -4px; right: -8px; background: var(--orange); color: white;
            font-size: 0.6rem; min-width: 18px; height: 18px; border-radius: 50%;
            display: none; align-items: center; justify-content: center; font-weight: 700; padding: 0 4px;
        }

        .nav-profile {
            display: flex; align-items: center; gap: 0.4rem; text-decoration: none;
            padding: 0.3rem 0.5rem; border-radius: 50px;
            transition: transform 0.15s var(--ease-soft),
                        opacity 0.15s var(--ease-soft),
                        background-color 0.15s var(--ease-soft);
            min-height: 44px; touch-action: manipulation;
        }
        .nav-profile:active { transform: scale(0.96); opacity: 0.8; }
        .nav-profile:hover { background: rgba(255,255,255,0.08); }
        .nav-avatar {
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover; background: var(--orange);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
        }
        .nav-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .nav-profile-name { color: white; font-size: 0.8rem; font-weight: 500; display: none; }
        @media (min-width: 600px) { .nav-profile-name { display: block; } }

        .btn-logout {
            background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 0.8rem; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif;
            font-size: 0.78rem; font-weight: 500;
            transition: transform 0.15s var(--ease-soft),
                        opacity 0.15s var(--ease-soft),
                        background-color 0.15s var(--ease-soft);
            min-width: 44px; min-height: 44px; touch-action: manipulation;
        }
        .btn-logout:active { transform: scale(0.94); opacity: 0.7; }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); }

        /* ---------- CONTAINER ---------- */
        .container { max-width: 1100px; margin: 0 auto; padding: clamp(1rem, 3vw, 1.5rem); }

        /* ---------- HERO ---------- */
        .marketplace-hero {
            background: linear-gradient(135deg, #0a1628, #1a3048);
            border-radius: var(--radius); padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 3vw, 2rem);
            margin-bottom: 1.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .marketplace-hero h1 { color: white; font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 800; margin-bottom: 0.3rem; }
        .marketplace-hero p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

        /* ---------- SEARCH BAR ---------- */
        .search-bar {
            display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap;
            background: white; padding: 0.8rem; border-radius: var(--radius);
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .search-input-wrapper { flex: 2; min-width: 200px; position: relative; }
        .search-input-wrapper input {
            width: 100%; padding: 0.85rem 1rem 0.85rem 2.8rem; border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 0.95rem;
            background: var(--gray-50); outline: none;
            transition: border-color 0.2s var(--ease-soft), box-shadow 0.2s var(--ease-soft);
        }
        .search-input-wrapper input:focus { border-color: var(--orange); background: white; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; pointer-events: none; }
        .filter-select {
            padding: 0.85rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.85rem; background: var(--gray-50); color: var(--navy);
            cursor: pointer; outline: none; min-width: 130px; flex: 1;
            min-height: 44px; touch-action: manipulation;
            transition: border-color 0.2s var(--ease-soft), box-shadow 0.2s var(--ease-soft);
        }
        .filter-select:focus { border-color: var(--orange); }

        /* ---------- CATEGORY PILLS ---------- */
        .category-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .pill {
            padding: 0.5rem 1.2rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; border: 1px solid var(--border); background: white; color: var(--navy);
            transition: transform 0.15s var(--ease-soft),
                        opacity 0.15s var(--ease-soft),
                        background-color 0.15s var(--ease-soft),
                        border-color 0.15s var(--ease-soft);
            white-space: nowrap; min-height: 44px; display: inline-flex; align-items: center;
            touch-action: manipulation;
        }
        .pill:active { transform: scale(0.95); opacity: 0.8; }
        .pill.active {
            background: var(--orange); color: white; border-color: var(--orange);
            box-shadow: 0 4px 16px rgba(255,107,53,0.2);
        }

        /* ---------- RESULTS INFO ---------- */
        .results-info {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.2rem; font-size: 0.85rem; color: var(--text-muted);
        }
        .results-count { font-weight: 500; }
        .results-count strong { color: var(--navy); }

        /* ---------- LISTING GRID ---------- */
        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
            opacity: 0;
            transition: opacity 0.25s var(--ease-soft);
        }
        .listing-grid.visible { opacity: 1; }

        .listing-card {
            background: white; border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden; cursor: pointer; text-decoration: none; color: inherit;
            display: block;
            transition: transform 0.2s var(--ease-soft),
                        opacity 0.2s var(--ease-soft),
                        border-color 0.2s var(--ease-soft);
            touch-action: manipulation;
        }
        .listing-card:active { transform: scale(0.97); opacity: 0.9; }
        .listing-card:hover { border-color: var(--orange); }

        .listing-img {
            height: 180px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; position: relative;
            background: var(--gray-100);
        }
        .listing-img img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .listing-img img.loaded { opacity: 1; }

        .condition-badge {
            position: absolute; top: 12px; left: 12px; background: var(--navy); color: white;
            font-size: 0.65rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .condition-badge.used { background: #5c6b7a; }

        .save-btn {
            position: absolute; top: 12px; right: 12px;
            width: 44px; height: 44px;
            border-radius: 50%; background: rgba(255,255,255,0.9); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            cursor: pointer; z-index: 2;
            transition: transform 0.15s var(--ease-soft), opacity 0.15s var(--ease-soft);
            touch-action: manipulation;
        }
        .save-btn:active { transform: scale(0.85); }
        .save-btn.saved { color: #e74c3c; border-color: #e74c3c; }
        /* CHANGE: single keyframe bounce instead of competing inline-style transform —
           prevents the :active scale and the "bounce" from fighting each other */
        .save-btn.bounce { animation: saveBounce 0.3s var(--ease-soft); }
        @keyframes saveBounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .listing-body { padding: clamp(0.8rem, 2vw, 1.1rem); }
        .listing-title {
            font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .listing-price { font-size: 1.2rem; font-weight: 800; color: var(--orange); margin-bottom: 0.5rem; }
        .listing-meta { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--text-muted); flex-wrap: wrap; }
        .verified-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; display: inline-block; }

        /* ---------- SKELETON LOADER ---------- */
        .skeleton-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem;
            opacity: 1;
            transition: opacity 0.2s var(--ease-soft);
        }
        .skeleton-grid.hidden { opacity: 0; pointer-events: none; position: absolute; }
        .skeleton-card { background: white; border-radius: var(--radius); overflow: hidden; }
        .skeleton-img { height: 180px; background: linear-gradient(90deg, #eef1f5 25%, #e2e6ea 50%, #eef1f5 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        .skeleton-body { padding: 1rem; }
        .skeleton-line { height: 14px; background: #eef1f5; border-radius: 6px; margin-bottom: 8px; }
        .skeleton-line.short { width: 60%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ---------- EMPTY STATE ---------- */
        .empty-state { text-align: center; padding: 5rem 1rem; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--text-muted); font-size: 0.95rem; }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            padding: 1rem 2rem calc(1rem + var(--safe-bottom));
            font-size: 0.75rem; color: var(--text-muted); margin-top: 2rem;
        }

        /* ---------- MOBILE ---------- */
        @media (max-width: 500px) {
            .listing-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .skeleton-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .listing-img { height: 130px; font-size: 2.5rem; }
            .listing-title { font-size: 0.82rem; }
            .listing-price { font-size: 1rem; }
            .marketplace-hero { padding: 1.5rem; }
            .marketplace-hero h1 { font-size: 1.3rem; }
            .save-btn { width: 40px; height: 40px; font-size: 1rem; top: 8px; right: 8px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace" class="active">Marketplace</a>
            <a href="/chat">
                Messages
                <span class="nav-badge" id="msg-badge"></span>
            </a>
            <a href="/saved">Saved</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/notifications">
                🔔
                <span class="nav-badge" id="notif-badge"></span>
            </a>
            <span id="auth-area"></span>
        </div>
    </nav>

    <div class="container">
        <div class="marketplace-hero">
            <h1>🔥 LASU Marketplace</h1>
            <p>Find the best deals from verified students on campus</p>
        </div>

        <div class="search-bar">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search for anything...">
            </div>
            <select id="campus-filter" class="filter-select">
                <option value="">📍 All Campuses</option>
                <option value="LASU">LASU</option>
                <option value="UNILAG">UNILAG</option>
                <option value="UI">UI</option>
                <option value="OAU">OAU</option>
                <option value="Other">Other</option>
            </select>
            <select id="condition-filter" class="filter-select">
                <option value="">📦 Condition</option>
                <option value="New">New</option>
                <option value="Used">Used</option>
            </select>
            <select id="sort-filter" class="filter-select">
                <option value="newest">🕐 Newest</option>
                <option value="price_low">💰 Price: Low→High</option>
                <option value="price_high">💰 Price: High→Low</option>
            </select>
        </div>

        <div class="category-pills">
            <span class="pill active" data-category="">🏷️ All</span>
            <span class="pill" data-category="Electronics">📱 Electronics</span>
            <span class="pill" data-category="Fashion">👟 Fashion</span>
            <span class="pill" data-category="Books">📚 Books</span>
            <span class="pill" data-category="Food">🍕 Food</span>
            <span class="pill" data-category="Services">🔧 Services</span>
            <span class="pill" data-category="Other">📦 Other</span>
        </div>

        <div class="results-info">
            <span class="results-count" id="results-count">Loading...</span>
        </div>

        <div class="skeleton-grid" id="skeleton-grid">
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        </div>

        <div class="listing-grid" id="listing-grid"></div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';
        function getToken() { return localStorage.getItem('vendly_token'); }
        function clearToken() { localStorage.removeItem('vendly_token'); }
        function logout() { clearToken(); window.location.href = '/login'; }

        function showBadge(el, count) {
            if (count > 0) { el.textContent = count > 99 ? '99+' : count; el.style.display = 'flex'; }
            else { el.style.display = 'none'; }
        }

        async function loadBadges() {
            const token = getToken();
            if (!token) return;
            try {
                const [notifRes, msgRes] = await Promise.all([
                    fetch(`${API_BASE}/api/notifications/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_BASE}/api/chat/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                const notifData = await notifRes.json();
                const msgData = await msgRes.json();
                showBadge(document.getElementById('notif-badge'), notifData.count);
                showBadge(document.getElementById('msg-badge'), msgData.count);
            } catch (e) {}
        }

        (async function updateNav() {
            const authEl = document.getElementById('auth-area');
            const token = getToken();
            if (token) {
                try {
                    const res = await fetch(`${API_BASE}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.ok) {
                        const user = (await res.json()).user;
                        authEl.innerHTML = `
                            <a href="/profile/${user.id}" class="nav-profile" title="View Profile">
                                <div class="nav-avatar">${user.profile_picture ? `<img src="${user.profile_picture}" alt="${user.full_name}">` : (user.full_name || '?')[0].toUpperCase()}</div>
                                <span class="nav-profile-name">${(user.full_name || '').split(' ')[0]}</span>
                            </a>
                            <button class="btn-logout" onclick="logout()">Logout</button>`;
                        loadBadges();
                        setInterval(loadBadges, 30000);
                        return;
                    }
                } catch (e) {}
            }
            authEl.innerHTML = '<a href="/login" class="btn-nav">Login</a>';
        })();

        let currentCategory = '';
        const listingGrid = document.getElementById('listing-grid');
        const skeletonGrid = document.getElementById('skeleton-grid');
        const resultsCount = document.getElementById('results-count');

        document.querySelectorAll('.pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentCategory = pill.dataset.category;
                fetchListings();
            });
        });

        document.getElementById('campus-filter').addEventListener('change', fetchListings);
        document.getElementById('condition-filter').addEventListener('change', fetchListings);
        document.getElementById('sort-filter').addEventListener('change', fetchListings);

        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(fetchListings, 350);
        });

        const categoryEmojis = { 'Electronics':'📱', 'Fashion':'👟', 'Books':'📚', 'Food':'🍕', 'Services':'🔧', 'Other':'📦' };
        const categoryColors = { 'Electronics':'#e8f0fe', 'Fashion':'#f0f7f0', 'Books':'#fef2e7', 'Food':'#fff3e0', 'Services':'#f3e5f5', 'Other':'#eceff1' };

        // CHANGE: Fade-based swap between skeleton and real grid instead of an
        // instant display:none/block toggle — feels less abrupt on mobile.
        function showLoading() {
            skeletonGrid.classList.remove('hidden');
            listingGrid.classList.remove('visible');
        }

        function hideLoading() {
            skeletonGrid.classList.add('hidden');
            listingGrid.classList.add('visible');
        }

        async function fetchListings() {
            showLoading();
            const params = new URLSearchParams();
            const search = document.getElementById('search-input').value.trim();
            if (search) params.append('search', search);
            if (currentCategory) params.append('category', currentCategory);
            const campus = document.getElementById('campus-filter').value;
            if (campus) params.append('campus', campus);
            const condition = document.getElementById('condition-filter').value;
            if (condition) params.append('condition', condition);
            params.append('sort', document.getElementById('sort-filter').value);

            try {
                const res = await fetch(`${API_BASE}/api/listings?${params.toString()}`);
                const listings = await res.json();

                if (!listings || listings.length === 0) {
                    listingGrid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h2>No listings found</h2><p>Try a different search or category</p></div>';
                    resultsCount.innerHTML = '<strong>0</strong> items';
                    hideLoading();
                    return;
                }
                resultsCount.innerHTML = `<strong>${listings.length}</strong> item${listings.length > 1 ? 's' : ''} found`;
                listingGrid.innerHTML = listings.map(l => `
                    <a href="/listing/${l.id}" class="listing-card">
                        <div class="listing-img" style="background:${categoryColors[l.category] || '#eef1f5'};">
                            ${l.images && l.images[0] ? `<img src="${l.images[0]}" alt="${l.title}" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none'">` : categoryEmojis[l.category] || '📦'}
                            <span class="condition-badge${l.condition==='Used'?' used':''}">${l.condition}</span>
                            <span class="save-btn" onclick="event.preventDefault();event.stopPropagation();toggleSave(${l.id},this)" title="Save">♡</span>
                        </div>
                        <div class="listing-body">
                            <div class="listing-title">${escapeHTML(l.title)}</div>
                            <div class="listing-price">₦${l.price.toLocaleString()}</div>
                            <div class="listing-meta">${l.seller&&l.seller.verified_badge?'<span class="verified-dot"></span> Verified ·':''}${l.campus}</div>
                        </div>
                    </a>`).join('');
                hideLoading();

            } catch (err) {
                listingGrid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h2>Couldn\'t load listings</h2><p>Check your connection</p></div>';
                hideLoading();
            }
        }

        function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function toggleSave(listingId, el) {
            const token = getToken();
            if (!token) { sessionStorage.setItem('vendly_return_url', window.location.href); window.location.href = '/login?message=' + encodeURIComponent('Please log in to save items.'); return; }
            try {
                if (el.classList.contains('saved')) {
                    await fetch(`${API_BASE}/api/saved/${listingId}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} });
                    el.classList.remove('saved'); el.textContent = '♡';
                } else {
                    await fetch(`${API_BASE}/api/saved/${listingId}`, { method:'POST', headers:{'Authorization':`Bearer ${token}`} });
                    el.classList.add('saved'); el.textContent = '♥';
                }
                // CHANGE: single keyframe bounce class, auto-removes itself —
                // no competing inline transform with the :active CSS state
                el.classList.remove('bounce');
                void el.offsetWidth; // restart animation if double-tapped
                el.classList.add('bounce');
                el.addEventListener('animationend', () => el.classList.remove('bounce'), { once: true });
            } catch (err) { console.error('Save failed:', err); }
        }

        fetchListings();
    </script>
</body>
</html>
