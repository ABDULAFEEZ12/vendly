<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Vendly • student marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #050508;
      --bg-base: #0b0b12;
      --surface-elevated: #14141f;
      --surface-glass: rgba(18, 18, 28, 0.75);
      --surface-glass-heavy: rgba(14, 14, 22, 0.85);
      --text-primary: #f4f4f9;
      --text-secondary: #9a9bb0;
      --text-tertiary: #5f6078;
      --accent: #ff5e3a;
      --accent-soft: rgba(255, 94, 58, 0.15);
      --accent-glow: rgba(255, 94, 58, 0.4);
      --green: #2ecc71;
      --green-soft: rgba(46, 204, 113, 0.15);
      --blue: #5e9eff;
      --blue-soft: rgba(94, 158, 255, 0.12);
      --purple: #b98eff;
      --purple-soft: rgba(185, 142, 255, 0.12);
      --border-glass: rgba(255, 255, 255, 0.08);
      --border-active: rgba(255, 255, 255, 0.15);
      --radius-sm: 14px;
      --radius-md: 22px;
      --radius-lg: 32px;
      --radius-full: 999px;
      --shadow-float: 0 20px 40px -20px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 30px rgba(255,94,58,0.25);
      --ease-spring: cubic-bezier(0.22, 0.61, 0.36, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      font-size: 16px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-bottom: calc(80px + var(--safe-bottom));
      position: relative;
      isolation: isolate;
      letter-spacing: -0.01em;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 10%, rgba(255,94,58,0.08) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(94,158,255,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .app-container {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 2;
      padding: 20px 18px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    @media (min-width: 768px) {
      .app-container {
        max-width: 720px;
        padding: 32px 28px 0;
      }
    }
    /* ----- mobile bottom nav ----- */
    .bottom-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 36px);
      max-width: 400px;
      background: var(--surface-glass-heavy);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-full);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 120;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      transition: transform 0.2s var(--ease-spring);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--text-tertiary);
      font-size: 0.7rem;
      font-weight: 550;
      transition: all 0.2s var(--ease-smooth);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 30px;
      letter-spacing: -0.01em;
    }
    .nav-item.active {
      color: var(--accent);
      font-weight: 650;
    }
    .nav-icon {
      font-size: 1.5rem;
      transition: transform 0.2s var(--ease-spring);
    }
    .nav-item.active .nav-icon {
      transform: translateY(-2px);
      filter: drop-shadow(0 4px 8px var(--accent-glow));
    }
    .floating-sell-btn {
      background: var(--accent);
      color: white;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 10px 28px var(--accent-glow);
      transition: all 0.2s var(--ease-spring);
      margin-top: -24px;
      cursor: pointer;
    }
    .floating-sell-btn:active { transform: scale(0.9); }
    /* ----- search centerpiece ----- */
    .search-hero {
      background: var(--surface-glass);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      border: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 40px -18px rgba(0,0,0,0.7);
      transition: box-shadow 0.3s;
    }
    .search-hero:focus-within {
      box-shadow: 0 0 0 2px rgba(255,94,58,0.4), 0 24px 44px -16px black;
    }
    .search-icon-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
    }
    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      color: var(--text-primary);
      outline: none;
      font-weight: 500;
    }
    #search-input::placeholder { color: var(--text-tertiary); }
    .voice-icon {
      font-size: 1.3rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
    }
    /* ----- filter pills horizontal scroll ----- */
    .filter-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-chip {
      background: var(--surface-glass);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      color: var(--text-secondary);
      transition: all 0.2s;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 600;
      box-shadow: 0 6px 18px var(--accent-soft);
    }
    /* ----- product cards reinvented ----- */
    .product-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .product-card {
      background: var(--surface-elevated);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border-glass);
      transition: all 0.25s var(--ease-spring);
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 30px -16px black;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .product-card:active { transform: scale(0.98); }
    .card-image {
      height: 220px;
      background: #1a1a2a;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      overflow: hidden;
    }
    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease-spring);
    }
    .product-card:hover .card-image img { transform: scale(1.04); }
    .badge-top-left {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(10,10,18,0.8);
      backdrop-filter: blur(14px);
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .favorite-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(20,20,30,0.8);
      backdrop-filter: blur(16px);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      z-index: 5;
    }
    .favorite-btn.saved { color: #ff5e3a; }
    .card-content {
      padding: 16px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .price-tag {
      font-size: 1.5rem;
      font-weight: 750;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .title-line {
      font-weight: 600;
      font-size: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .verified-pill {
      background: var(--green-soft);
      color: var(--green);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    /* skeleton */
    .skeleton-card {
      background: var(--surface-elevated);
      border-radius: 28px;
      height: 320px;
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-tertiary); }
    .login-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    @media (max-width: 400px) {
      .card-image { height: 180px; }
    }
  </style>
</head>
<body>
  <div class="app-container" id="app-container">
    <!-- dynamic greeting & search -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <div style="font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em;">👋 Hey</div>
        <div style="color: var(--text-secondary); font-size: 0.9rem;">Find campus deals</div>
      </div>
      <div id="profile-area"></div>
    </div>

    <div class="search-hero" id="search-hero">
      <span class="search-icon-wrapper">🔍</span>
      <input type="text" id="search-input" placeholder="Search textbooks, gadgets..." autocomplete="off" />
      <span class="voice-icon">🎤</span>
    </div>

    <div class="filter-scroll" id="category-scroll">
      <span class="filter-chip active" data-category="">🔥 All</span>
      <span class="filter-chip" data-category="Electronics">📱 Tech</span>
      <span class="filter-chip" data-category="Fashion">👕 Fashion</span>
      <span class="filter-chip" data-category="Books">📚 Books</span>
      <span class="filter-chip" data-category="Food">🍔 Food</span>
      <span class="filter-chip" data-category="Services">🛠️ Services</span>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <select id="campus-filter" style="background:var(--surface-glass); border:1px solid var(--border-glass); color:white; padding:10px 16px; border-radius:30px;">
        <option value="">🏛️ All campuses</option>
        <option value="LASU">LASU</option>
        <option value="UNILAG">UNILAG</option>
        <option value="OAU">OAU</option>
      </select>
      <select id="condition-filter" style="background:var(--surface-glass); border:1px solid var(--border-glass); color:white; padding:10px 16px; border-radius:30px;">
        <option value="">📦 Condition</option>
        <option value="New">New</option>
        <option value="Used">Used</option>
      </select>
    </div>

    <div id="results-banner" style="font-size:0.8rem; color:var(--text-tertiary);"></div>

    <div class="product-grid" id="listing-grid"></div>
    <div id="skeleton-container" class="product-grid"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active"><span class="nav-icon">🏠</span><span>Home</span></button>
    <button class="nav-item"><span class="nav-icon">💬</span><span>Chat</span></button>
    <button class="floating-sell-btn" onclick="alert('Sell feature')">+</button>
    <button class="nav-item"><span class="nav-icon">❤️</span><span>Saved</span></button>
    <button class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></button>
  </div>

  <script>
    const API_BASE = '';
    function getToken() { return localStorage.getItem('vendly_token'); }
    function clearToken() { localStorage.removeItem('vendly_token'); }
    function logout() { clearToken(); window.location.href = '/login'; }

    const listingGrid = document.getElementById('listing-grid');
    const skeletonContainer = document.getElementById('skeleton-container');
    let currentCategory = '';

    function showSkeleton() {
      skeletonContainer.innerHTML = Array(3).fill(`<div class="skeleton-card"></div>`).join('');
      listingGrid.innerHTML = '';
    }
    function hideSkeleton() { skeletonContainer.innerHTML = ''; }

    async function fetchListings() {
      showSkeleton();
      const params = new URLSearchParams();
      const search = document.getElementById('search-input').value.trim();
      if (search) params.append('search', search);
      if (currentCategory) params.append('category', currentCategory);
      const campus = document.getElementById('campus-filter').value;
      if (campus) params.append('campus', campus);
      const condition = document.getElementById('condition-filter').value;
      if (condition) params.append('condition', condition);
      params.append('sort', 'newest');

      try {
        const res = await fetch(`${API_BASE}/api/listings?${params.toString()}`);
        const listings = await res.json();
        hideSkeleton();
        if (!listings || listings.length === 0) {
          listingGrid.innerHTML = `<div class="empty-state">📭<br>No listings yet</div>`;
          document.getElementById('results-banner').innerText = '';
          return;
        }
        document.getElementById('results-banner').innerText = `${listings.length} item${listings.length>1?'s':''}`;
        listingGrid.innerHTML = listings.map(l => {
          const emoji = { Electronics:'📱', Fashion:'👕', Books:'📚', Food:'🍔', Services:'🛠️' }[l.category] || '📦';
          const verifiedHtml = l.seller?.verified_badge ? '<span class="verified-pill">✓ Verified</span>' : '';
          return `
            <a href="/listing/${l.id}" class="product-card">
              <div class="card-image">
                ${l.images?.[0] ? `<img src="${l.images[0]}" alt="${l.title}" onerror="this.style.display='none'" />` : `<span>${emoji}</span>`}
                <span class="badge-top-left">${l.condition||'Used'}</span>
                <button class="favorite-btn" onclick="event.preventDefault();event.stopPropagation();toggleSave(${l.id},this)">♡</button>
              </div>
              <div class="card-content">
                <div class="price-tag">₦${l.price?.toLocaleString()}</div>
                <div class="title-line">${escapeHTML(l.title)}</div>
                <div class="meta-row">
                  ${verifiedHtml}
                  <span>📍 ${escapeHTML(l.campus||'Campus')}</span>
                </div>
              </div>
            </a>`;
        }).join('');
      } catch (err) {
        hideSkeleton();
        listingGrid.innerHTML = `<div class="empty-state">⚠️ Couldn't load</div>`;
      }
    }

    function escapeHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function toggleSave(listingId, el) {
      const token = getToken();
      if (!token) {
        sessionStorage.setItem('vendly_return_url', window.location.href);
        window.location.href = '/login';
        return;
      }
      if (el.classList.contains('saved')) {
        await fetch(`${API_BASE}/api/saved/${listingId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        el.classList.remove('saved'); el.textContent = '♡';
      } else {
        await fetch(`${API_BASE}/api/saved/${listingId}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
        el.classList.add('saved'); el.textContent = '♥';
      }
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        currentCategory = this.dataset.category;
        fetchListings();
      });
    });

    document.getElementById('campus-filter').addEventListener('change', fetchListings);
    document.getElementById('condition-filter').addEventListener('change', fetchListings);
    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(fetchListings, 350);
    });

    (async function loadProfile() {
      const token = getToken();
      const area = document.getElementById('profile-area');
      if (token) {
        try {
          const res = await fetch(`${API_BASE}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
          if (res.ok) {
            const user = (await res.json()).user;
            area.innerHTML = `<button onclick="logout()" style="background:transparent; border:1px solid #444; color:white; padding:8px 16px; border-radius:30px;">Logout</button>`;
            return;
          }
        } catch(e) {}
      }
      area.innerHTML = `<a href="/login"><button class="login-btn">Login</button></a>`;
    })();

    fetchListings();
  </script>
</body>
</html>
