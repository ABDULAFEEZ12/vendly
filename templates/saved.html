<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Items — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 14px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
        }

        .navbar {
            background: var(--navy);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--orange);
            text-decoration: none;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.75rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-links a.active { color: var(--orange); }
        .btn-logout {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.3px;
        }
        .page-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }
        .page-header .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: white;
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-weight: 500;
        }
        .page-header .count strong {
            color: var(--orange);
        }

        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.25rem;
        }

        .listing-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            display: block;
            position: relative;
        }
        .listing-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(13,27,42,0.06);
            border-color: var(--orange);
        }

        .listing-img {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }
        .listing-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .condition-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--navy);
            color: white;
            font-size: 0.62rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .condition-badge.used { background: #5c6b7a; }

        .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: white;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 2;
            color: #999;
        }
        .remove-btn:hover {
            background: #fef2f2;
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .listing-body { padding: 1rem; }
        .listing-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .listing-price {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--orange);
            margin-bottom: 0.5rem;
        }
        .listing-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .listing-meta .seller {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .seller-avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.55rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .verified-dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }

        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .empty-state h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .empty-state p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .btn-primary {
            background: var(--orange);
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn-primary:hover { background: #e8551f; transform: translateY(-1px); }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--navy);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 500px) {
            .listing-grid { grid-template-columns: repeat(2, 1fr); }
            .listing-img { height: 120px; font-size: 2rem; }
            .listing-title { font-size: 0.8rem; }
            .listing-price { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <a href="/chat">Messages</a>
            <a href="/saved" class="active">Saved</a>
            <a href="/dashboard">Dashboard</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>❤️ Saved Items</h1>
                <p>Your bookmarked listings — come back anytime</p>
            </div>
            <div class="count" id="saved-count">Loading...</div>
        </div>

        <div id="listing-grid" class="listing-grid">
            <!-- Populated by JS -->
        </div>

        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="icon">🔖</div>
            <h2>Nothing saved yet</h2>
            <p>Tap the heart on any listing to save it here.<br>Your favorites will be waiting for you.</p>
            <a href="/marketplace" class="btn-primary">Browse Marketplace</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';

        function getToken() {
            return localStorage.getItem('vendly_token');
        }
        function clearToken() {
            localStorage.removeItem('vendly_token');
        }
        function logout() {
            clearToken();
            window.location.href = '/login';
        }

        const categoryEmojis = {
            'Electronics': '📱',
            'Fashion': '👟',
            'Books': '📚',
            'Food': '🍕',
            'Services': '🔧',
            'Other': '📦'
        };

        const categoryColors = {
            'Electronics': '#e8f0fe',
            'Fashion': '#f0f7f0',
            'Books': '#fef2e7',
            'Food': '#fff3e0',
            'Services': '#f3e5f5',
            'Other': '#eceff1'
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function loadSaved() {
            const token = getToken();
            if (!token) { window.location.href = '/login'; return; }

            const gridEl = document.getElementById('listing-grid');
            const emptyEl = document.getElementById('empty-state');
            const countEl = document.getElementById('saved-count');

            try {
                const res = await fetch(API_BASE + '/api/saved', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) { logout(); return; }

                const listings = await res.json();

                if (!listings || listings.length === 0) {
                    gridEl.style.display = 'none';
                    emptyEl.style.display = 'block';
                    countEl.innerHTML = '<strong>0</strong> saved';
                    return;
                }

                gridEl.style.display = 'grid';
                emptyEl.style.display = 'none';
                countEl.innerHTML = `<strong>${listings.length}</strong> saved`;

                gridEl.innerHTML = listings.map(l => {
                    const seller = l.seller || {};
                    const initials = (seller.full_name || '?')[0];
                    return `
                        <a href="/listing/${l.id}" class="listing-card">
                            <div class="listing-img" style="background:${categoryColors[l.category] || '#eef1f5'};">
                                ${l.images && l.images[0]
                                    ? `<img src="${l.images[0]}" alt="${escapeHTML(l.title)}" loading="lazy">`
                                    : categoryEmojis[l.category] || '📦'}
                                <span class="condition-badge${l.condition === 'Used' ? ' used' : ''}">${l.condition}</span>
                            </div>
                            <button class="remove-btn" onclick="event.preventDefault();event.stopPropagation();removeSaved(${l.id})" title="Remove from saved">✕</button>
                            <div class="listing-body">
                                <div class="listing-title">${escapeHTML(l.title)}</div>
                                <div class="listing-price">₦${l.price.toLocaleString()}</div>
                                <div class="listing-meta">
                                    <span class="seller">
                                        <span class="seller-avatar" style="background:${categoryColors[l.category] || '#eef1f5'};color:var(--navy);">${initials}</span>
                                        ${escapeHTML(seller.full_name || 'Unknown')}
                                    </span>
                                    ${seller.verified_badge ? '<span class="verified-dot"></span>' : ''}
                                    · ${l.campus}
                                </div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (err) {
                console.error('Failed to load saved:', err);
                gridEl.innerHTML = '<div class="empty-state"><p>Failed to load. Please try again.</p></div>';
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function removeSaved(listingId) {
            const token = getToken();
            try {
                const res = await fetch(`${API_BASE}/api/saved/${listingId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    showToast('Removed from saved');
                    loadSaved();
                }
            } catch (err) {
                console.error('Remove failed:', err);
            }
        }

        loadSaved();
    </script>
</body>
</html>
