<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container { width: 100%; max-width: 420px; }
        .logo-area { text-align: center; margin-bottom: 2rem; }
        .logo {
            font-size: 1.8rem; font-weight: 900; color: var(--orange);
            text-decoration: none; letter-spacing: -0.5px;
        }
        .logo span { color: var(--navy); font-weight: 700; }
        .card {
            background: white; border: 1px solid var(--border);
            border-radius: var(--radius); padding: 2.5rem 2rem;
            box-shadow: 0 4px 20px rgba(13,27,42,0.04);
        }
        .card h2 { font-size: 1.4rem; font-weight: 800; color: var(--navy); margin-bottom: 0.5rem; }
        .card .subtitle { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.3rem; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--navy); margin-bottom: 0.4rem; }
        .form-group input {
            width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border);
            border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
            font-size: 0.9rem; background: var(--gray-50); outline: none; transition: all 0.2s;
        }
        .form-group input:focus { border-color: var(--orange); background: white; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
        .btn-submit {
            width: 100%; padding: 0.9rem; background: var(--orange); color: white;
            border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
            font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255,107,53,0.25);
        }
        .btn-submit:hover { background: #e8551f; transform: translateY(-1px); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        .alert {
            padding: 0.8rem 1rem; border-radius: var(--radius-sm); font-size: 0.82rem;
            margin-bottom: 1.5rem; display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .password-hint { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.3rem; }
        .error-state { text-align: center; padding: 2rem; }
        .error-state h3 { color: var(--navy); margin-bottom: 0.5rem; }
        .error-state p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .btn-outline {
            display: inline-block; padding: 0.7rem 1.5rem; border: 1px solid var(--orange);
            color: var(--orange); border-radius: var(--radius-sm); text-decoration: none;
            font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .btn-outline:hover { background: var(--orange); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <a href="/" class="logo">VEND<span>LY</span></a>
        </div>
        <div class="card" id="reset-card">
            <h2>Reset your password</h2>
            <p class="subtitle">Enter your new password below.</p>

            <div id="alert" class="alert"></div>

            <form id="reset-form">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
                    <p class="password-hint">Minimum 6 characters</p>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Reset Password</button>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const alertBox = document.getElementById('alert');
        const cardEl = document.getElementById('reset-card');

        function showAlert(type, msg) {
            alertBox.textContent = msg;
            alertBox.className = `alert alert-${type} show`;
        }

        // Check if token exists
        if (!token) {
            cardEl.innerHTML = `
                <div class="error-state">
                    <h3>⚠️ Invalid Link</h3>
                    <p>This password reset link is missing or invalid.</p>
                    <a href="/forgot-password" class="btn-outline">Request a New Link</a>
                </div>
            `;
        }

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('submit-btn');

            if (password.length < 6) {
                showAlert('error', 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirm) {
                showAlert('error', 'Passwords do not match');
                return;
            }

            btn.textContent = 'Resetting...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (res.ok) {
                    cardEl.innerHTML = `
                        <div class="error-state">
                            <h3>✅ Password Reset!</h3>
                            <p>${data.msg}</p>
                            <a href="/login" class="btn-outline">Go to Login</a>
                        </div>
                    `;
                } else {
                    showAlert('error', data.msg || 'Reset failed');
                    btn.textContent = 'Reset Password';
                    btn.disabled = false;
                }

            } catch (err) {
                showAlert('error', 'Something went wrong. Try again.');
                btn.textContent = 'Reset Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
