<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--
      CHANGE: Added viewport-fit=cover for iPhone notch/home indicator safe-area support.
      Also kept width and initial-scale for responsive rendering.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard — Vendly</title>
    <!--
      CHANGE: Added display=swap to prevent layout shift while Inter loads.
      The browser will use a fallback font until Inter is ready, then swap — no invisible text flash.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 16px;   /* slightly softer */
            --radius-sm: 12px;
            /* safe-area insets for iPhone notch/home indicator */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /*
          CHANGE: Global touch-action and tap highlight removal.
          -webkit-tap-highlight-color: transparent stops the gray flash on iOS.
          touch-action: manipulation prevents double-tap zoom on buttons.
        */
        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain; /* prevents whole-page bounce on iOS */
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
            /* native momentum scroll on iOS */
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            /* padding for safe areas */
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: var(--navy);
            /*
              CHANGE: Added safe-area padding to top so navbar clears iPhone notch.
            */
            padding: calc(0.8rem + var(--safe-top)) 2rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--orange);
            text-decoration: none;
            /* CHANGE: minimum tap target 44px */
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            /*
              CHANGE: GPU-accelerated transition on transform & opacity only.
              cubic-bezier(0.4, 0, 0.2, 1) gives a native iOS feel.
              will-change: transform hints the GPU to pre-composite.
            */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            /* minimum 44x44 touch target */
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        /*
          CHANGE: :active state with scale-down feedback (no layout-triggering properties).
          Hover kept for desktop, but :active is the primary mobile feedback.
        */
        .nav-links a:active {
            transform: scale(0.96);
            opacity: 0.8;
            background: rgba(255,255,255,0.12);
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-links a.active { color: var(--orange); }

        .nav-badge {
            position: absolute;
            top: -4px;
            right: -8px;
            background: var(--orange);
            color: white;
            font-size: 0.6rem;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 4px;
            /* CHANGE: badge doesn't need animations, so no will-change needed */
        }

        .nav-profile {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            padding: 0.3rem 0.5rem;
            border-radius: 50px;
            /*
              CHANGE: GPU-accelerated, same cubic-bezier as nav links.
              Minimum touch target 44px.
            */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: 0.5rem;
            min-height: 44px;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        .nav-profile:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .nav-profile:hover { background: rgba(255,255,255,0.08); }
        .nav-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .nav-avatar img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .nav-profile-name {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            display: none;
        }
        @media (min-width: 600px) {
            .nav-profile-name { display: block; }
        }

        .btn-logout {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            /*
              CHANGE: GPU-accelerated transition, minimum touch target.
            */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            margin-left: 0.3rem;
            min-width: 44px;
            min-height: 44px;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        .btn-logout:active {
            transform: scale(0.94);
            opacity: 0.7;
        }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); background: rgba(255,0,0,0.1); }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            /*
              CHANGE: responsive padding with clamp — prevents cramped feel on iPhone SE
              while keeping breathing room on larger screens.
            */
            padding: 0 clamp(1rem, 3vw, 2rem);
        }

        /* ---------- WELCOME BANNER ---------- */
        .welcome-banner {
            background: linear-gradient(135deg, var(--navy), #1a3448);
            color: white;
            /*
              CHANGE: responsive padding with clamp.
            */
            padding: clamp(1.5rem, 4vw, 2.5rem) clamp(1rem, 3vw, 2rem);
            border-radius: var(--radius);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .welcome-banner h1 { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 800; }
        .welcome-banner p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 0.3rem; }
        .btn-primary {
            background: var(--orange);
            color: white;
            padding: clamp(0.6rem, 2vw, 0.75rem) clamp(1.2rem, 3vw, 1.5rem);
            border-radius: var(--radius-sm);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.85rem;
            /*
              CHANGE: GPU-accelerated transform+opacity. Softer shadow.
            */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(255,107,53,0.2);
            touch-action: manipulation;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            will-change: transform, opacity;
        }
        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.85;
            box-shadow: 0 2px 8px rgba(255,107,53,0.15);
        }
        .btn-primary:hover { background: #e8551f; }

        /* ---------- DASHBOARD GRID ---------- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: clamp(1rem, 2vw, 1.5rem);
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        /* ---------- CARDS ---------- */
        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /*
              CHANGE: responsive padding.
              Softer shadow added for "soft touch" feel.
            */
            padding: clamp(1rem, 3vw, 1.5rem);
            box-shadow: 0 2px 12px rgba(13,27,42,0.04);
        }
        .card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ---------- LISTING ITEM ---------- */
        .listing-item {
            display: flex;
            align-items: center;
            gap: clamp(0.5rem, 2vw, 1rem);
            padding: clamp(0.5rem, 2vw, 0.8rem) 0;
            border-bottom: 1px solid var(--border);
            /*
              CHANGE: Smooth transition for subtle feedback.
              Minimum touch target 44px tall.
            */
            min-height: 44px;
            transition: background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            touch-action: manipulation;
        }
        .listing-item:active {
            background-color: rgba(0,0,0,0.02);
        }
        .listing-item:last-child { border-bottom: none; }
        .listing-item-img {
            width: clamp(50px, 12vw, 70px);
            height: clamp(50px, 12vw, 70px);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 4vw, 2rem);
            flex-shrink: 0;
        }
        .listing-item-info { flex: 1; }
        .listing-item-info strong { font-size: 0.9rem; display: block; }
        .listing-item-info span { font-size: 0.8rem; color: var(--text-muted); }
        .listing-item-price {
            font-weight: 800;
            color: var(--orange);
            font-size: 0.95rem;
        }
        .badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-sold { background: #fce4ec; color: #c62828; }

        /* View/Edit links — bigger touch targets */
        .listing-item-info a {
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            display: inline-block;
            min-width: 44px;
            min-height: 30px;
            text-align: center;
            touch-action: manipulation;
            transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.12s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }
        .listing-item-info a:active {
            transform: scale(0.94);
            opacity: 0.7;
        }

        /* ---------- CHAT ITEM ---------- */
        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: clamp(0.5rem, 2vw, 0.7rem) 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            /*
              CHANGE: GPU-accelerated, minimum 44px touch target.
            */
            min-height: 52px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        .chat-item:active {
            transform: scale(0.98);
            opacity: 0.8;
        }
        .chat-item:last-child { border-bottom: none; }
        .chat-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        .chat-preview strong { font-size: 0.85rem; display: block; }
        .chat-preview span { font-size: 0.75rem; color: var(--text-muted); }

        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 0.9rem; }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            /*
              CHANGE: Added safe-area-inset-bottom padding so footer clears iPhone home indicator.
            */
            padding: 1rem 1.5rem calc(1rem + var(--safe-bottom));
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <a href="/chat">
                Messages
                <span class="nav-badge" id="msg-badge"></span>
            </a>
            <a href="/saved">Saved</a>
            <a href="/dashboard" class="active">Dashboard</a>
            <a href="/notifications">
                🔔
                <span class="nav-badge" id="notif-badge"></span>
            </a>
            <a href="/profile/me" class="nav-profile" id="nav-profile-link">
                <div class="nav-avatar" id="nav-avatar">?</div>
                <span class="nav-profile-name" id="nav-profile-name">Profile</span>
            </a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-banner">
            <div>
                <h1 id="greeting">Welcome back 👋</h1>
                <p id="user-info">Loading...</p>
            </div>
            <a href="/listings/new" class="btn-primary">+ New Listing</a>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h2>📦 My Listings</h2>
                <div id="my-listings">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>Loading your listings...</p>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>💬 Recent Chats</h2>
                <div id="recent-chats">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        <p>Loading chats...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';
        let currentUserId = null;

        function getToken() { return localStorage.getItem('vendly_token'); }
        function clearToken() { localStorage.removeItem('vendly_token'); }
        function logout() { clearToken(); window.location.href = '/login'; }

        async function apiGet(url) {
            const token = getToken();
            const res = await fetch(API_BASE + url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        function updateNavProfile(user) {
            currentUserId = user.id;
            const avatarEl = document.getElementById('nav-avatar');
            const nameEl = document.getElementById('nav-profile-name');
            const linkEl = document.getElementById('nav-profile-link');
            linkEl.href = `/profile/${user.id}`;
            if (user.profile_picture) {
                avatarEl.innerHTML = `<img src="${user.profile_picture}" alt="${user.full_name}">`;
            } else {
                avatarEl.innerHTML = '';
                avatarEl.textContent = (user.full_name || '?')[0].toUpperCase();
            }
            nameEl.textContent = user.full_name.split(' ')[0];
        }

        /*
          CHANGE: showBadge now only updates textContent and display — no innerHTML rebuild.
          This avoids layout thrashing when called every 30s.
        */
        function showBadge(el, count) {
            if (count > 0) {
                el.textContent = count > 99 ? '99+' : count;
                el.style.display = 'flex';
            } else {
                el.style.display = 'none';
            }
        }

        async function loadBadges() {
            const token = getToken();
            if (!token) return;
            try {
                const [notifRes, msgRes] = await Promise.all([
                    fetch(`${API_BASE}/api/notifications/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch(`${API_BASE}/api/chat/unread-count`, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);
                const notifData = await notifRes.json();
                const msgData = await msgRes.json();
                /*
                  CHANGE: Batch DOM reads/writes — get references once, update in one microtask.
                  Only badge elements are touched; no innerHTML on parent containers.
                */
                const notifBadge = document.getElementById('notif-badge');
                const msgBadge = document.getElementById('msg-badge');
                showBadge(notifBadge, notifData.count);
                showBadge(msgBadge, msgData.count);
            } catch (e) {}
        }

        async function loadDashboard() {
            if (!getToken()) { window.location.href = '/login'; return; }
            const userRes = await apiGet('/api/auth/me');
            if (!userRes) return;
            const user = userRes.user;
            updateNavProfile(user);

            document.getElementById('greeting').textContent = `Welcome back, ${user.full_name.split(' ')[0]} 👋`;
            document.getElementById('user-info').textContent = `${user.school || 'LASU'} · ${user.department || ''}`;

            const listingsRes = await apiGet(`/api/listings/user/${user.id}`);
            const listings = listingsRes || [];
            const listingsEl = document.getElementById('my-listings');

            if (listings.length === 0) {
                listingsEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>You haven't listed anything yet.</p><a href="/listings/new" class="btn-primary" style="display:inline-block;margin-top:1rem;">+ Create Your First Listing</a></div>`;
            } else {
                listingsEl.innerHTML = listings.map(l => `
                    <div class="listing-item">
                        <div class="listing-item-img" style="background:#${l.category==='Electronics'?'e8f0fe':l.category==='Books'?'fef2e7':l.category==='Fashion'?'f0f7f0':'f7edf8'};">${l.category==='Electronics'?'📱':l.category==='Books'?'📚':l.category==='Fashion'?'👟':'📦'}</div>
                        <div class="listing-item-info">
                            <strong>${l.title}</strong>
                            <span>${l.campus} · ${l.condition} · <span class="badge ${l.is_sold?'badge-sold':'badge-active'}">${l.is_sold?'Sold':'Active'}</span></span>
                            <div style="margin-top:0.3rem;">
                                <a href="/listing/${l.id}" style="font-size:0.75rem;color:var(--orange);margin-right:0.5rem;">View</a>
                                <a href="/listings/${l.id}/edit" style="font-size:0.75rem;color:var(--navy);">Edit</a>
                            </div>
                        </div>
                        <div class="listing-item-price">₦${l.price.toLocaleString()}</div>
                    </div>
                `).join('');
            }

            const chatsRes = await apiGet('/api/chat/rooms');
            const chats = chatsRes || [];
            const chatsEl = document.getElementById('recent-chats');

            if (chats.length === 0) {
                chatsEl.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>No conversations yet.</p><a href="/marketplace" style="font-size:0.85rem;color:var(--orange);">Browse items to start chatting</a></div>`;
            } else {
                chatsEl.innerHTML = chats.slice(0, 6).map(c => `
                    <a href="/chat/${c.room_id}" class="chat-item">
                        <div class="chat-avatar" style="background:#${c.other_user.full_name.charCodeAt(0)%2===0?'e8f0fe':'fef2e7'};color:var(--navy);">${c.other_user.full_name[0]}</div>
                        <div class="chat-preview">
                            <strong>${c.other_user.full_name}</strong>
                            <span>${c.listing.title} · ${c.last_message?c.last_message.content:'No messages yet'}</span>
                        </div>
                    </a>
                `).join('');
            }

            loadBadges();
        }

        loadDashboard();
        setInterval(loadBadges, 30000);
    </script>
</body>
</html>
