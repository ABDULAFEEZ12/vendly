<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CHANGE: Added viewport-fit=cover for iPhone notch/home indicator safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Messages — Vendly</title>
    <!-- CHANGE: Added display=swap to prevent flash of invisible text while font loads -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 16px;   /* slightly softer */
            --radius-sm: 12px;
            /* CHANGE: safe-area insets for iPhone notch/home indicator */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* CHANGE: Global tap highlight removal and momentum scrolling */
        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: var(--navy);
            /* CHANGE: safe-area top padding so navbar clears iPhone notch */
            padding: calc(1rem + var(--safe-top)) 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--orange);
            text-decoration: none;
            /* CHANGE: minimum 44px tap target */
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            /* CHANGE: GPU-accelerated, 44px minimum, soft cubic-bezier */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 44px; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        /* CHANGE: :active tap feedback */
        .nav-links a:active {
            transform: scale(0.96);
            opacity: 0.8;
            background: rgba(255,255,255,0.12);
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
        .nav-links a.active { color: var(--orange); }

        .btn-logout {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            /* CHANGE: GPU-accelerated, 44px minimum */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 44px; min-height: 44px;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        .btn-logout:active {
            transform: scale(0.94);
            opacity: 0.7;
        }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); background: rgba(255,0,0,0.1); }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 700px;
            margin: 2rem auto;
            /* CHANGE: responsive padding with clamp */
            padding: 0 clamp(1rem, 3vw, 1.5rem);
        }

        /* ---------- PAGE HEADER ---------- */
        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--navy);
            letter-spacing: -0.3px;
        }
        .page-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* ---------- CHAT LIST ---------- */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .chat-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* CHANGE: responsive padding */
            padding: clamp(0.8rem, 2vw, 1rem) clamp(1rem, 2vw, 1.2rem);
            display: flex;
            align-items: center;
            gap: clamp(0.6rem, 2vw, 1rem);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            /* CHANGE: GPU-accelerated, 52px minimum for comfortable tap */
            min-height: 52px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        /* CHANGE: :active tap state — no layout shift */
        .chat-card:active {
            transform: scale(0.98);
            opacity: 0.85;
        }
        .chat-card:hover {
            border-color: var(--orange);
        }

        .chat-avatar {
            width: clamp(44px, 8vw, 52px);
            height: clamp(44px, 8vw, 52px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            font-weight: 700;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-info .name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--navy);
        }
        .chat-info .item {
            font-size: 0.78rem;
            color: var(--orange);
            font-weight: 500;
            margin-top: 1px;
        }
        .chat-info .preview {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* CHANGE: responsive max-width */
            max-width: clamp(180px, 40vw, 350px);
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
            /* CHANGE: minimum width so price doesn't cramp */
            min-width: 60px;
        }
        .chat-meta .price {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--navy);
        }
        .chat-meta .time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .chat-meta .unread {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            margin-top: 4px;
        }

        /* ---------- SKELETON LOADER ---------- */
        /* CHANGE: Skeleton shimmer instead of blank screen while loading */
        .skeleton-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .skeleton-avatar {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: linear-gradient(90deg, #eef1f5 25%, #e2e6ea 50%, #eef1f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            flex-shrink: 0;
        }
        .skeleton-lines { flex: 1; }
        .skeleton-line {
            height: 12px;
            background: #eef1f5;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .skeleton-line.short { width: 55%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
        }
        .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .empty-state h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .empty-state p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }

        .btn-primary {
            background: var(--orange);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            /* CHANGE: GPU-accelerated, 44px minimum */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            touch-action: manipulation;
            will-change: transform, opacity;
        }
        .btn-primary:active { transform: scale(0.96); opacity: 0.85; }
        .btn-primary:hover { background: #e8551f; }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            /* CHANGE: safe-area bottom padding for iPhone home indicator */
            padding: 1rem 2rem calc(1rem + var(--safe-bottom));
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 500px) {
            .chat-info .preview { max-width: 180px; }
            .skeleton-avatar { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <a href="/chat" class="active">Messages</a>
            <a href="/saved">Saved</a>
            <a href="/dashboard">Dashboard</a>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>💬 Messages</h1>
            <p>Your conversations with buyers and sellers</p>
        </div>

        <!-- CHANGE: Skeleton loader shown during initial load -->
        <div id="skeleton-list" class="chat-list">
            <div class="skeleton-card"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-avatar"></div><div class="skeleton-lines"><div class="skeleton-line"></div><div class="skeleton-line short"></div></div></div>
        </div>

        <div id="chat-list" class="chat-list" style="display:none;"></div>

        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="icon">💬</div>
            <h2>No conversations yet</h2>
            <p>Start browsing listings and message a seller to begin.</p>
            <a href="/marketplace" class="btn-primary">Browse Marketplace</a>
        </div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';

        function getToken() {
            return localStorage.getItem('vendly_token');
        }
        function clearToken() {
            localStorage.removeItem('vendly_token');
        }
        function logout() {
            clearToken();
            window.location.href = '/login';
        }

        async function loadChats() {
            const token = getToken();
            if (!token) { window.location.href = '/login'; return; }

            try {
                const res = await fetch(API_BASE + '/api/chat/rooms', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) { logout(); return; }

                const rooms = await res.json();
                const listEl = document.getElementById('chat-list');
                const skeletonEl = document.getElementById('skeleton-list');
                const emptyEl = document.getElementById('empty-state');

                // CHANGE: Hide skeleton, show actual content
                skeletonEl.style.display = 'none';

                if (!rooms || rooms.length === 0) {
                    listEl.style.display = 'none';
                    emptyEl.style.display = 'block';
                    return;
                }

                listEl.style.display = 'flex';
                emptyEl.style.display = 'none';

                const avatarColors = ['#e8f0fe', '#fef2e7', '#f0f7f0', '#fdf0f8', '#e8f5e9', '#fff3e0'];

                listEl.innerHTML = rooms.map((room, i) => {
                    const otherUser = room.other_user;
                    const listing = room.listing;
                    const lastMsg = room.last_message;
                    const initials = otherUser.full_name.split(' ').map(n => n[0]).join('').toUpperCase();
                    const avatarBg = avatarColors[i % avatarColors.length];
                    const time = lastMsg ? timeAgo(new Date(lastMsg.created_at)) : '';

                    return `
                        <a href="/chat/${room.room_id}" class="chat-card">
                            <div class="chat-avatar" style="background:${avatarBg};color:var(--navy);">
                                ${initials}
                            </div>
                            <div class="chat-info">
                                <div class="name">${otherUser.full_name} ${otherUser.verified_badge ? '✓' : ''}</div>
                                <div class="item">${listing.title}</div>
                                <div class="preview">${lastMsg ? lastMsg.content : 'Start a conversation...'}</div>
                            </div>
                            <div class="chat-meta">
                                <div class="price">₦${listing.price.toLocaleString()}</div>
                                <div class="time">${time}</div>
                            </div>
                        </a>
                    `;
                }).join('');

            } catch (err) {
                console.error('Failed to load chats:', err);
                document.getElementById('skeleton-list').style.display = 'none';
            }
        }

        function timeAgo(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd';
            return date.toLocaleDateString();
        }

        loadChats();
    </script>
</body>
</html>
