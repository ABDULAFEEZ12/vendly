<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>Messages — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --bg-base: #0a0a10;
            --surface-elevated: #12121c;
            --surface-glass: rgba(14, 14, 24, 0.75);
            --surface-glass-heavy: rgba(10, 10, 18, 0.88);
            --text-primary: #f2f2f7;
            --text-secondary: #9a9ab0;
            --text-tertiary: #5a5a70;
            --accent: #ff5e3a;
            --accent-soft: rgba(255, 94, 58, 0.15);
            --accent-glow: rgba(255, 94, 58, 0.4);
            --green: #2ecc71;
            --green-soft: rgba(46, 204, 113, 0.15);
            --blue: #5e9eff;
            --blue-soft: rgba(94, 158, 255, 0.12);
            --purple: #b98eff;
            --purple-soft: rgba(185, 142, 255, 0.12);
            --border-glass: rgba(255, 255, 255, 0.07);
            --border-active: rgba(255, 255, 255, 0.14);
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 32px;
            --radius-full: 999px;
            --shadow-float: 0 20px 40px -20px rgba(0,0,0,0.7);
            --shadow-glow: 0 0 30px rgba(255,94,58,0.25);
            --ease-spring: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: var(--safe-top);
            padding-bottom: calc(90px + var(--safe-bottom));
            position: relative;
            isolation: isolate;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 5%, rgba(255,94,58,0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(94,158,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(185,142,255,0.04) 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ---------- CONTAINER ---------- */
        .app-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
            padding: 24px 18px 0;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        @media (min-width: 768px) {
            .app-container {
                max-width: 740px;
                padding: 36px 28px 0;
                gap: 36px;
            }
        }

        /* ---------- PAGE HEADER ---------- */
        .page-header {
            margin-bottom: 4px;
        }
        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, #e0e0ff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 500;
        }

        /* ---------- CHAT LIST ---------- */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-card {
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.25s var(--ease-spring);
            box-shadow: 0 4px 20px -8px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .chat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,94,58,0.06) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .chat-card:hover::before {
            opacity: 1;
        }
        .chat-card:active {
            transform: scale(0.97);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255,94,58,0.15);
        }
        .chat-card:hover {
            border-color: var(--border-active);
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            flex-shrink: 0;
            border: 2px solid var(--border-glass);
            position: relative;
        }
        .chat-avatar .verified-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--accent);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-deep);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-info .name {
            font-size: 0.95rem;
            font-weight: 650;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-info .item {
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 500;
            margin-top: 2px;
        }
        .chat-info .preview {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }

        .chat-meta {
            text-align: right;
            flex-shrink: 0;
            min-width: 65px;
        }
        .chat-meta .price {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
        }
        .chat-meta .time {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 3px;
        }
        .chat-meta .unread-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            background: var(--accent);
            border-radius: 50%;
            margin-top: 5px;
            box-shadow: 0 0 12px var(--accent-glow);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 6px var(--accent-glow); }
            50% { box-shadow: 0 0 16px var(--accent-glow), 0 0 24px rgba(255,94,58,0.3); }
        }

        /* ---------- SKELETON LOADER ---------- */
        .skeleton-card {
            background: var(--surface-glass);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(20px);
        }
        .skeleton-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(90deg, #1a1a2e 25%, #222240 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            flex-shrink: 0;
        }
        .skeleton-lines {
            flex: 1;
        }
        .skeleton-line {
            height: 13px;
            background: linear-gradient(90deg, #1a1a2e 25%, #222240 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 7px;
            margin-bottom: 10px;
        }
        .skeleton-line.short {
            width: 55%;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .empty-state h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.25s var(--ease-bounce);
            box-shadow: 0 8px 24px var(--accent-glow);
            font-family: 'Inter', sans-serif;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255,94,58,0.5);
        }
        .btn-primary:active {
            transform: scale(0.94);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* ---------- BOTTOM NAV ---------- */
        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: var(--surface-glass-heavy);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 120;
            box-shadow: 0 20px 44px -16px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
            gap: 4px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: var(--text-tertiary);
            font-size: 0.7rem;
            font-weight: 550;
            transition: all 0.25s var(--ease-smooth);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            letter-spacing: -0.01em;
            text-decoration: none;
            position: relative;
        }
        .nav-item.active {
            color: var(--accent);
            font-weight: 650;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--accent);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .nav-icon {
            font-size: 1.4rem;
            transition: transform 0.25s var(--ease-bounce);
        }
        .nav-item.active .nav-icon {
            transform: translateY(-2px);
            filter: drop-shadow(0 6px 10px var(--accent-glow));
        }
        .floating-sell-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 12px 30px var(--accent-glow), 0 0 0 4px rgba(255,94,58,0.2);
            transition: all 0.25s var(--ease-bounce);
            margin-top: -28px;
            cursor: pointer;
            text-decoration: none;
        }
        .floating-sell-btn:active {
            transform: scale(0.88);
            box-shadow: 0 6px 16px var(--accent-glow);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 500px) {
            .chat-info .preview {
                max-width: 160px;
            }
        }
    </style>
</head>
<body>
    <!-- MAIN CONTAINER -->
    <div class="app-container">
        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1>💬 Messages</h1>
            <p>Your conversations with buyers and sellers</p>
        </div>

        <!-- SKELETON LOADER -->
        <div id="skeleton-list" class="chat-list">
            <div class="skeleton-card">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-lines">
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
        </div>

        <!-- CHAT LIST -->
        <div id="chat-list" class="chat-list" style="display:none;"></div>

        <!-- EMPTY STATE -->
        <div id="empty-state" class="empty-state" style="display:none;">
            <span class="icon">💬</span>
            <h2>No conversations yet</h2>
            <p>Start browsing listings and message a seller to begin your campus trading journey.</p>
            <a href="/marketplace" class="btn-primary">🔍 Browse Marketplace</a>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <a href="/marketplace" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="/chat" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </a>
        <a href="/listings/new" class="floating-sell-btn">+</a>
        <a href="/saved" class="nav-item">
            <span class="nav-icon">❤️</span>
            <span>Saved</span>
        </a>
        <a href="/profile/me" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </div>

    <script>
        const API_BASE = '';

        function getToken() {
            return localStorage.getItem('vendly_token');
        }

        function clearToken() {
            localStorage.removeItem('vendly_token');
        }

        function logout() {
            clearToken();
            window.location.href = '/login';
        }

        async function loadChats() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/chat/rooms', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    logout();
                    return;
                }

                const rooms = await res.json();
                const listEl = document.getElementById('chat-list');
                const skeletonEl = document.getElementById('skeleton-list');
                const emptyEl = document.getElementById('empty-state');

                // Hide skeleton, show actual content
                skeletonEl.style.display = 'none';

                if (!rooms || rooms.length === 0) {
                    listEl.style.display = 'none';
                    emptyEl.style.display = 'block';
                    return;
                }

                listEl.style.display = 'flex';
                emptyEl.style.display = 'none';

                // Avatar color palette matching the dark theme
                const avatarColors = [
                    'rgba(255,94,58,0.2)',
                    'rgba(94,158,255,0.2)',
                    'rgba(185,142,255,0.2)',
                    'rgba(46,204,113,0.2)',
                    'rgba(255,180,60,0.2)',
                    'rgba(255,94,160,0.2)',
                    'rgba(94,255,200,0.2)',
                    'rgba(160,94,255,0.2)'
                ];

                const avatarTextColors = [
                    '#ff5e3a',
                    '#5e9eff',
                    '#b98eff',
                    '#2ecc71',
                    '#ffb43c',
                    '#ff5ea0',
                    '#5effc8',
                    '#a05eff'
                ];

                listEl.innerHTML = rooms.map((room, i) => {
                    const otherUser = room.other_user;
                    const listing = room.listing;
                    const lastMsg = room.last_message;
                    const initials = otherUser.full_name
                        .split(' ')
                        .map(n => n[0])
                        .join('')
                        .toUpperCase()
                        .slice(0, 2);
                    const avatarBg = avatarColors[i % avatarColors.length];
                    const avatarText = avatarTextColors[i % avatarTextColors.length];
                    const time = lastMsg ? timeAgo(new Date(lastMsg.created_at)) : '';
                    const hasUnread = room.unread_count > 0;

                    return `
                        <a href="/chat/${room.room_id}" class="chat-card">
                            <div class="chat-avatar" style="background:${avatarBg};color:${avatarText};">
                                ${initials}
                                ${otherUser.verified_badge ? '<span class="verified-badge">✓</span>' : ''}
                            </div>
                            <div class="chat-info">
                                <div class="name">
                                    ${escapeHTML(otherUser.full_name)}
                                    ${otherUser.verified_badge ? '<span style="color:var(--accent);font-size:0.7rem;">✓</span>' : ''}
                                </div>
                                <div class="item">${escapeHTML(listing.title)}</div>
                                <div class="preview">${lastMsg ? escapeHTML(lastMsg.content) : 'Start a conversation...'}</div>
                            </div>
                            <div class="chat-meta">
                                <div class="price">₦${listing.price.toLocaleString()}</div>
                                <div class="time">${time}</div>
                                ${hasUnread ? '<span class="unread-dot"></span>' : ''}
                            </div>
                        </a>
                    `;
                }).join('');

                // Add subtle mouse tracking for chat cards (optional hover effect)
                document.querySelectorAll('.chat-card').forEach(card => {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        const x = ((e.clientX - rect.left) / rect.width) * 100;
                        const y = ((e.clientY - rect.top) / rect.height) * 100;
                        card.style.setProperty('--mouse-x', x + '%');
                        card.style.setProperty('--mouse-y', y + '%');
                    });
                });

            } catch (err) {
                console.error('Failed to load chats:', err);
                document.getElementById('skeleton-list').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('empty-state').querySelector('h2').textContent = '⚠️ Connection Error';
                document.getElementById('empty-state').querySelector('p').textContent = 'Could not load your messages. Please try again.';
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function timeAgo(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);

            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd';

            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric'
            });
        }

        // Initialize
        loadChats();
    </script>
</body>
</html>
