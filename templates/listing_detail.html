<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <title>Listing — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --bg-base: #0a0a10;
            --surface-elevated: #12121c;
            --surface-glass: rgba(14, 14, 24, 0.75);
            --surface-glass-heavy: rgba(10, 10, 18, 0.88);
            --text-primary: #f2f2f7;
            --text-secondary: #9a9ab0;
            --text-tertiary: #5a5a70;
            --accent: #ff5e3a;
            --accent-soft: rgba(255, 94, 58, 0.15);
            --accent-glow: rgba(255, 94, 58, 0.4);
            --green: #2ecc71;
            --green-soft: rgba(46, 204, 113, 0.15);
            --blue: #5e9eff;
            --blue-soft: rgba(94, 158, 255, 0.12);
            --purple: #b98eff;
            --purple-soft: rgba(185, 142, 255, 0.12);
            --red: #ff4757;
            --red-soft: rgba(255, 71, 87, 0.15);
            --amber: #ffb43c;
            --amber-soft: rgba(255, 180, 60, 0.12);
            --border-glass: rgba(255, 255, 255, 0.07);
            --border-active: rgba(255, 255, 255, 0.14);
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 32px;
            --radius-full: 999px;
            --shadow-float: 0 20px 40px -20px rgba(0,0,0,0.7);
            --shadow-glow: 0 0 30px rgba(255,94,58,0.25);
            --ease-spring: cubic-bezier(0.22, 0.61, 0.36, 1);
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: var(--safe-top);
            padding-bottom: calc(90px + var(--safe-bottom));
            position: relative;
            isolation: isolate;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 5%, rgba(255,94,58,0.12) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(94,158,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(185,142,255,0.04) 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ---------- HEADER ---------- */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface-glass-heavy);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border-bottom: 1px solid var(--border-glass);
            padding: calc(16px + var(--safe-top)) 20px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px -12px rgba(0,0,0,0.5);
        }
        .header-logo {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .header-logo .accent {
            color: var(--accent);
            font-weight: 800;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-btn {
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s var(--ease-smooth);
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-active);
        }
        .header-btn:active {
            transform: scale(0.95);
        }
        .btn-logout {
            background: transparent;
            color: var(--text-tertiary);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.25s var(--ease-smooth);
            white-space: nowrap;
        }
        .btn-logout:hover {
            color: var(--red);
            border-color: rgba(255,71,87,0.3);
        }
        .btn-logout:active {
            transform: scale(0.95);
        }
        .btn-login {
            background: var(--accent);
            color: white !important;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 650;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.25s var(--ease-bounce);
            box-shadow: 0 4px 16px var(--accent-glow);
            white-space: nowrap;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255,94,58,0.5);
        }
        .btn-login:active {
            transform: scale(0.95);
        }

        /* ---------- CONTAINER ---------- */
        .app-container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 2;
            padding: 24px 18px 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        @media (min-width: 768px) {
            .app-container {
                max-width: 900px;
                padding: 36px 28px 0;
                gap: 32px;
            }
        }

        /* ---------- LISTING DETAIL ---------- */
        .listing-detail {
            background: var(--surface-glass);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 20px 40px -16px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
            overflow: hidden;
        }
        .listing-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .listing-images {
            flex: 1;
            min-width: 280px;
            max-width: 500px;
        }
        .listing-info {
            flex: 1;
            min-width: 260px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ---------- MAIN IMAGE ---------- */
        .main-image {
            width: 100%;
            height: 350px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            overflow: hidden;
            background: var(--surface-elevated);
            border: 1px solid var(--border-glass);
            position: relative;
        }
        .main-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-md);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .main-image img.loaded {
            opacity: 1;
        }
        .main-image .placeholder-emoji {
            font-size: 5rem;
            opacity: 0.5;
        }

        /* ---------- STATUS BADGE ---------- */
        .status-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            backdrop-filter: blur(16px);
            letter-spacing: 0.02em;
            z-index: 2;
        }
        .status-available {
            background: var(--green-soft);
            color: var(--green);
            border: 1px solid rgba(46,204,113,0.3);
        }
        .status-sold {
            background: var(--red-soft);
            color: var(--red);
            border: 1px solid rgba(255,71,87,0.3);
        }

        /* ---------- THUMBNAILS ---------- */
        .thumbnails {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .thumb {
            width: 64px;
            height: 64px;
            border-radius: 14px;
            cursor: pointer;
            border: 2px solid var(--border-glass);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow: hidden;
            min-width: 44px;
            min-height: 44px;
            touch-action: manipulation;
            transition: all 0.2s var(--ease-bounce);
            will-change: transform;
            background: var(--surface-elevated);
        }
        .thumb:hover {
            border-color: var(--border-active);
            transform: translateY(-2px);
        }
        .thumb:active {
            transform: scale(0.92);
        }
        .thumb.active {
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-soft), 0 0 0 3px var(--accent-soft);
        }
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /* ---------- LISTING INFO ---------- */
        .listing-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.2;
            color: var(--text-primary);
        }
        .listing-price {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: -0.04em;
        }
        .listing-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .listing-meta span {
            background: var(--surface-glass);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .listing-description {
            line-height: 1.7;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ---------- SELLER CARD ---------- */
        .seller-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--surface-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.25s var(--ease-spring);
            will-change: transform;
        }
        .seller-card:hover {
            border-color: var(--border-active);
            box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
        }
        .seller-card:active {
            transform: scale(0.97);
            border-color: var(--accent);
        }
        .seller-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            flex-shrink: 0;
            border: 2px solid var(--border-glass);
        }
        .seller-name {
            font-weight: 650;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .verified-badge {
            color: var(--green);
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--green-soft);
            padding: 2px 8px;
            border-radius: 12px;
        }
        .seller-subtitle {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-top: 3px;
        }

        /* ---------- BUTTONS ---------- */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-primary, .btn-outline, .btn-save {
            padding: 14px 22px;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            transition: all 0.2s var(--ease-bounce);
            will-change: transform, opacity;
            border: none;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 28px var(--accent-glow), 0 0 0 3px rgba(255,94,58,0.15);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(255,94,58,0.5), 0 0 0 5px rgba(255,94,58,0.1);
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-outline {
            background: var(--surface-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-active);
            backdrop-filter: blur(16px);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }
        .btn-outline:active {
            transform: scale(0.95);
        }
        .btn-save {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
        }
        .btn-save:hover {
            border-color: var(--red);
            color: var(--red);
        }
        .btn-save.saved {
            color: var(--red);
            border-color: rgba(255,71,87,0.4);
            background: var(--red-soft);
        }

        /* ---------- SKELETON LOADER ---------- */
        .skeleton-block {
            background: linear-gradient(90deg, #1a1a2e 25%, #222240 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }
        .skeleton-img {
            width: 100%;
            height: 300px;
            border-radius: var(--radius-md);
        }
        .skeleton-line {
            height: 18px;
            margin-bottom: 14px;
            border-radius: 9px;
        }
        .skeleton-line.short {
            width: 45%;
        }
        .skeleton-line.medium {
            width: 70%;
        }
        .skeleton-line.large {
            height: 32px;
            width: 35%;
            margin-bottom: 16px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ---------- LOADING / ERROR ---------- */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .loading-state .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }
        .error-state .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ---------- BOTTOM NAV ---------- */
        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 420px;
            background: var(--surface-glass-heavy);
            backdrop-filter: blur(32px) saturate(180%);
            -webkit-backdrop-filter: blur(32px) saturate(180%);
            border: 1px solid var(--border-glass);
            border-radius: 40px;
            padding: 8px 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 120;
            box-shadow: 0 20px 44px -16px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
            gap: 4px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            color: var(--text-tertiary);
            font-size: 0.7rem;
            font-weight: 550;
            transition: all 0.25s var(--ease-smooth);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 30px;
            letter-spacing: -0.01em;
            text-decoration: none;
            position: relative;
        }
        .nav-item.active {
            color: var(--accent);
            font-weight: 650;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--accent);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .nav-icon {
            font-size: 1.4rem;
            transition: transform 0.25s var(--ease-bounce);
        }
        .nav-item.active .nav-icon {
            transform: translateY(-2px);
            filter: drop-shadow(0 6px 10px var(--accent-glow));
        }
        .floating-sell-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.7rem;
            box-shadow: 0 12px 30px var(--accent-glow), 0 0 0 4px rgba(255,94,58,0.2);
            transition: all 0.25s var(--ease-bounce);
            margin-top: -28px;
            cursor: pointer;
            text-decoration: none;
        }
        .floating-sell-btn:active {
            transform: scale(0.88);
            box-shadow: 0 6px 16px var(--accent-glow);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .listing-layout {
                flex-direction: column;
            }
            .listing-images {
                max-width: 100%;
            }
            .main-image {
                height: 280px;
                font-size: 3.5rem;
            }
            .listing-info h1 {
                font-size: 1.3rem;
            }
            .listing-price {
                font-size: 1.6rem;
            }
        }
        @media (max-width: 380px) {
            .main-image {
                height: 220px;
            }
            .thumb {
                width: 50px;
                height: 50px;
            }
            .btn-primary, .btn-outline, .btn-save {
                padding: 12px 16px;
                font-size: 0.82rem;
            }
            .header-btn.hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="app-header">
        <a href="/" class="header-logo">VEND<span class="accent">LY</span></a>
        <div class="header-actions">
            <a href="/marketplace" class="header-btn">🏠 Home</a>
            <a href="/dashboard" class="header-btn hide-mobile">📊 Dashboard</a>
            <span id="auth-action"></span>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="app-container">
        <!-- LISTING DETAIL -->
        <div class="listing-detail" id="listing-content">
            <!-- SKELETON LOADER -->
            <div class="listing-layout">
                <div class="listing-images">
                    <div class="skeleton-block skeleton-img"></div>
                    <div class="thumbnails">
                        <div class="skeleton-block" style="width:60px;height:60px;border-radius:14px;"></div>
                        <div class="skeleton-block" style="width:60px;height:60px;border-radius:14px;"></div>
                        <div class="skeleton-block" style="width:60px;height:60px;border-radius:14px;"></div>
                    </div>
                </div>
                <div class="listing-info">
                    <div class="skeleton-block skeleton-line"></div>
                    <div class="skeleton-block skeleton-line large"></div>
                    <div class="skeleton-block skeleton-line short"></div>
                    <div class="skeleton-block skeleton-line short"></div>
                    <div class="skeleton-block skeleton-line medium"></div>
                    <div class="skeleton-block skeleton-line medium"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="bottom-nav">
        <a href="/marketplace" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="/chat" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </a>
        <a href="/listings/new" class="floating-sell-btn">+</a>
        <a href="/saved" class="nav-item">
            <span class="nav-icon">❤️</span>
            <span>Saved</span>
        </a>
        <a href="/profile/me" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </a>
    </div>

    <script>
        const API_BASE = '';
        const listingId = window.location.pathname.split('/')[2];

        function getToken() { return localStorage.getItem('vendly_token'); }

        // Auth action in header
        (function() {
            const token = getToken();
            const authEl = document.getElementById('auth-action');
            if (token) {
                authEl.innerHTML = '<button class="btn-logout" onclick="localStorage.removeItem(\'vendly_token\');window.location.reload();">🚪 Logout</button>';
            } else {
                authEl.innerHTML = '<a href="/login" class="btn-login">Login</a>';
            }
        })();

        const categoryEmojis = {
            'Electronics': '📱',
            'Fashion': '👟',
            'Books': '📚',
            'Food': '🍕',
            'Services': '🔧',
            'Other': '📦'
        };

        const categoryColors = {
            'Electronics': 'rgba(94,158,255,0.2)',
            'Fashion': 'rgba(185,142,255,0.2)',
            'Books': 'rgba(255,180,60,0.2)',
            'Food': 'rgba(255,94,58,0.2)',
            'Services': 'rgba(46,204,113,0.2)',
            'Other': 'rgba(154,154,176,0.15)'
        };

        const categoryAvatarColors = {
            'Electronics': '#5e9eff',
            'Fashion': '#b98eff',
            'Books': '#ffb43c',
            'Food': '#ff5e3a',
            'Services': '#2ecc71',
            'Other': '#9a9ab0'
        };

        let currentListing = null;

        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        async function loadListing() {
            try {
                const res = await fetch(`${API_BASE}/api/listings/${listingId}`);
                if (!res.ok) throw new Error('Listing not found');

                const l = await res.json();
                currentListing = l;
                const seller = l.seller || {};
                const catColor = categoryColors[l.category] || categoryColors['Other'];
                const avatarColor = categoryAvatarColors[l.category] || categoryAvatarColors['Other'];

                const mainImgHTML = l.images && l.images[0]
                    ? `<img src="${escapeHTML(l.images[0])}" alt="${escapeHTML(l.title)}" onload="this.classList.add('loaded')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                       <span class="placeholder-emoji" style="display:none;">${categoryEmojis[l.category] || '📦'}</span>`
                    : `<span class="placeholder-emoji">${categoryEmojis[l.category] || '📦'}</span>`;

                const statusBadge = l.is_sold
                    ? '<span class="status-badge status-sold">🔴 Sold</span>'
                    : '<span class="status-badge status-available">🟢 Available</span>';

                const thumbs = (l.images || []).map((img, i) => `
                    <div class="thumb ${i === 0 ? 'active' : ''}" 
                         onclick="switchMainImage('${escapeHTML(img)}', this)" 
                         role="button" 
                         tabindex="0" 
                         aria-label="View image ${i + 1}">
                        <img src="${escapeHTML(img)}" alt="Thumbnail ${i + 1}" loading="lazy" onerror="this.style.display='none';">
                    </div>
                `).join('');

                const sellerInitials = (seller.full_name || '?')
                    .split(' ')
                    .map(n => n[0])
                    .join('')
                    .toUpperCase()
                    .slice(0, 2);

                document.getElementById('listing-content').innerHTML = `
                    <div class="listing-layout">
                        <div class="listing-images">
                            <div class="main-image" id="main-image-container" style="background:${catColor};">
                                ${mainImgHTML}
                                ${statusBadge}
                            </div>
                            ${l.images && l.images.length > 1 ? `<div class="thumbnails">${thumbs}</div>` : ''}
                        </div>
                        <div class="listing-info">
                            <h1>${escapeHTML(l.title)}</h1>
                            <div class="listing-price">₦${l.price.toLocaleString()}</div>
                            <div class="listing-meta">
                                <span>📦 ${escapeHTML(l.condition || 'N/A')}</span>
                                <span>📍 ${escapeHTML(l.campus || 'N/A')}</span>
                                <span>📂 ${escapeHTML(l.category || 'Other')}</span>
                            </div>
                            <p class="listing-description">${escapeHTML(l.description) || 'No description provided.'}</p>
                            
                            <div class="seller-card" onclick="window.location.href='/profile/${seller.id || '#'}'" role="button" tabindex="0">
                                <div class="seller-avatar" style="background:${catColor};color:${avatarColor};">
                                    ${sellerInitials}
                                </div>
                                <div>
                                    <div class="seller-name">
                                        ${escapeHTML(seller.full_name || 'Unknown Seller')}
                                        ${seller.verified_badge ? '<span class="verified-badge">✓ Verified</span>' : ''}
                                    </div>
                                    <div class="seller-subtitle">
                                        ${escapeHTML(seller.school || '')}${seller.department ? ' · ' + escapeHTML(seller.department) : ''}
                                    </div>
                                </div>
                            </div>

                            <div class="btn-row">
                                ${!l.is_sold ? `
                                    <button class="btn-primary" onclick="startChat()">💬 Message Seller</button>
                                    <button class="btn-outline" onclick="makeOffer()">💰 Make Offer</button>
                                ` : `
                                    <button class="btn-outline" disabled style="opacity:0.5;cursor:not-allowed;">🔴 Item Sold</button>
                                `}
                                <button class="btn-save" onclick="toggleSave()" id="save-btn">🤍 Save</button>
                            </div>
                        </div>
                    </div>`;

                // Check if saved
                checkSavedStatus();

            } catch (err) {
                console.error('Load listing error:', err);
                document.getElementById('listing-content').innerHTML = `
                    <div class="error-state">
                        <span class="icon">❌</span>
                        <h2 style="color:var(--text-primary);margin-bottom:8px;">Listing Not Found</h2>
                        <p style="color:var(--text-secondary);margin-bottom:20px;">This listing may have been removed or the link is incorrect.</p>
                        <a href="/marketplace" class="btn-primary" style="display:inline-flex;">🏠 Browse Marketplace</a>
                    </div>`;
            }
        }

        function switchMainImage(imgSrc, thumbElement) {
            const container = document.getElementById('main-image-container');
            const existingImg = container.querySelector('img');
            const placeholder = container.querySelector('.placeholder-emoji');
            const statusBadge = container.querySelector('.status-badge');

            // Remove old image
            if (existingImg) existingImg.remove();
            if (placeholder) placeholder.style.display = 'none';

            // Create new image
            const newImg = document.createElement('img');
            newImg.src = imgSrc;
            newImg.alt = currentListing?.title || 'Listing image';
            newImg.className = 'loaded';
            newImg.onerror = function() {
                this.style.display = 'none';
                if (placeholder) placeholder.style.display = 'flex';
            };

            // Insert before status badge if it exists
            if (statusBadge) {
                container.insertBefore(newImg, statusBadge);
            } else {
                container.appendChild(newImg);
            }

            // Update active thumbnail
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            if (thumbElement) thumbElement.classList.add('active');
        }

        async function checkSavedStatus() {
            const token = getToken();
            if (!token) return;

            try {
                const res = await fetch(`${API_BASE}/api/saved`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const saved = await res.json();
                    const isSaved = saved.some(s => s.listing_id == listingId || s.id == listingId);
                    const btn = document.getElementById('save-btn');
                    if (btn && isSaved) {
                        btn.textContent = '❤️ Saved';
                        btn.classList.add('saved');
                    }
                }
            } catch (e) {
                // Silently fail — save status is non-critical
            }
        }

        async function startChat() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const btn = document.querySelector('.btn-primary');
                if (btn) {
                    btn.textContent = '⏳ Starting chat...';
                    btn.disabled = true;
                }

                const res = await fetch(`${API_BASE}/api/chat/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ listing_id: listingId })
                });

                if (res.status === 401) {
                    localStorage.removeItem('vendly_token');
                    window.location.href = '/login';
                    return;
                }

                const data = await res.json();
                window.location.href = `/chat/${data.room_id}`;

            } catch (e) {
                console.error('Start chat error:', e);
                alert('Could not start chat. Please try again.');
                const btn = document.querySelector('.btn-primary');
                if (btn) {
                    btn.textContent = '💬 Message Seller';
                    btn.disabled = false;
                }
            }
        }

        function makeOffer() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            const amount = prompt('Enter your offer amount (₦):');
            if (!amount || isNaN(amount) || parseFloat(amount) <= 0) {
                if (amount !== null) alert('Please enter a valid amount.');
                return;
            }

            // Start chat with offer parameter
            const url = `/chat/start?listing_id=${listingId}&offer=${parseFloat(amount)}`;
            startChatWithOffer(parseFloat(amount));
        }

        async function startChatWithOffer(amount) {
            const token = getToken();
            try {
                const res = await fetch(`${API_BASE}/api/chat/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        listing_id: listingId,
                        initial_offer: amount
                    })
                });

                if (res.status === 401) {
                    localStorage.removeItem('vendly_token');
                    window.location.href = '/login';
                    return;
                }

                const data = await res.json();
                window.location.href = `/chat/${data.room_id}?offer=${amount}`;

            } catch (e) {
                console.error('Start chat with offer error:', e);
                // Fallback to regular chat start
                startChat();
            }
        }

        async function toggleSave() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            const btn = document.getElementById('save-btn');
            const isSaved = btn.classList.contains('saved');

            try {
                if (isSaved) {
                    // Unsave
                    await fetch(`${API_BASE}/api/saved/${listingId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    btn.textContent = '🤍 Save';
                    btn.classList.remove('saved');
                } else {
                    // Save
                    await fetch(`${API_BASE}/api/saved/${listingId}`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    btn.textContent = '❤️ Saved';
                    btn.classList.add('saved');
                    // Brief scale animation
                    btn.style.transform = 'scale(1.08)';
                    setTimeout(() => {
                        btn.style.transform = '';
                    }, 200);
                }
            } catch (e) {
                console.error('Toggle save error:', e);
                alert('Could not update saved status. Please try again.');
            }
        }

        // Initialize
        loadListing();
    </script>
</body>
</html>
