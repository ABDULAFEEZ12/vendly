<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CHANGE: Added viewport-fit=cover for iPhone notch/home indicator safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Listing — Vendly</title>
    <!-- CHANGE: Added display=swap to prevent flash of invisible text while font loads -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 16px;
            --radius-sm: 12px;
            /* CHANGE: safe-area insets for iPhone notch/home indicator */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* CHANGE: Global tap highlight removal and momentum scrolling */
        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: var(--navy);
            /* CHANGE: safe-area top padding so navbar clears iPhone notch */
            padding: calc(1rem + var(--safe-top)) 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem; font-weight: 900; color: var(--orange); text-decoration: none;
            /* CHANGE: minimum 44px tap target */
            min-height: 44px; display: flex; align-items: center;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a, .nav-links button {
            color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem;
            font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 8px;
            /* CHANGE: GPU-accelerated, 44px minimum */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 44px; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; will-change: transform, opacity;
            background: transparent; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .nav-links a:active, .nav-links button:active {
            transform: scale(0.96); opacity: 0.8; background: rgba(255,255,255,0.12);
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            /* CHANGE: responsive padding */
            padding: 0 clamp(1rem, 3vw, 1.5rem);
        }

        /* ---------- LISTING DETAIL ---------- */
        .listing-detail {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* CHANGE: responsive padding, softer shadow */
            padding: clamp(1rem, 3vw, 2rem);
            box-shadow: 0 2px 16px rgba(13,27,42,0.04);
        }
        .listing-layout {
            display: flex;
            gap: clamp(1rem, 3vw, 2rem);
            flex-wrap: wrap;
        }
        .listing-images { flex: 1; min-width: 280px; }

        .main-image {
            width: 100%;
            /* CHANGE: responsive height */
            height: clamp(200px, 40vw, 350px);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(3rem, 6vw, 5rem);
            overflow: hidden;
        }
        /* CHANGE: Smooth fade-in for main image */
        .main-image img {
            width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .main-image img.loaded { opacity: 1; }

        .thumbnails {
            display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap;
        }
        /* CHANGE: Thumbnail — 44px minimum, GPU-accelerated */
        .thumb {
            width: 60px; height: 60px; border-radius: 10px;
            cursor: pointer; border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; overflow: hidden;
            min-width: 44px; min-height: 44px;
            touch-action: manipulation;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .thumb:active { transform: scale(0.94); }
        .thumb.active { border-color: var(--orange); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }

        .listing-info { flex: 1; min-width: 250px; }
        .listing-info h1 { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 800; margin-bottom: 0.5rem; }
        .listing-price {
            font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 900;
            color: var(--orange); margin-bottom: 0.75rem;
        }
        .listing-meta {
            display: flex; gap: 1rem; flex-wrap: wrap;
            font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;
        }
        .listing-description { line-height: 1.7; color: var(--navy); margin-bottom: 1.5rem; }

        .seller-card {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 1rem; background: var(--gray-50);
            border-radius: var(--radius-sm); margin-bottom: 1.5rem;
            /* CHANGE: smooth tap feedback */
            cursor: pointer; touch-action: manipulation;
            transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.12s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }
        .seller-card:active { transform: scale(0.98); opacity: 0.9; }
        .seller-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem; flex-shrink: 0;
        }
        .seller-name { font-weight: 600; }
        .verified-badge { color: #22c55e; font-size: 0.8rem; }

        .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        /* CHANGE: Buttons — 44px minimum, GPU-accelerated */
        .btn-primary, .btn-outline {
            padding: 0.8rem 1.5rem; border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-weight: 700; cursor: pointer;
            font-size: 0.9rem; text-decoration: none;
            min-height: 52px; display: inline-flex; align-items: center; justify-content: center;
            touch-action: manipulation;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity;
        }
        .btn-primary:active, .btn-outline:active { transform: scale(0.96); opacity: 0.85; }
        .btn-primary { background: var(--orange); color: white; border: none; }
        .btn-primary:hover { background: #e8551f; }
        .btn-outline { background: white; color: var(--navy); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--orange); }

        .loading { text-align: center; padding: 4rem; color: var(--text-muted); }

        /* CHANGE: Skeleton loader for listing detail */
        .skeleton-block { background: linear-gradient(90deg, #eef1f5 25%, #e2e6ea 50%, #eef1f5 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
        .skeleton-img { width: 100%; height: 300px; }
        .skeleton-line { height: 16px; margin-bottom: 12px; }
        .skeleton-line.short { width: 40%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            /* CHANGE: safe-area bottom padding for iPhone home indicator */
            padding: 1rem 2rem calc(1rem + var(--safe-bottom));
            font-size: 0.75rem; color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .main-image { height: 250px; font-size: 3rem; }
            .thumb { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <a href="/dashboard">Dashboard</a>
            <span id="auth-action"></span>
        </div>
    </nav>

    <div class="container">
        <div class="listing-detail" id="listing-content">
            <!-- CHANGE: Skeleton loader instead of text-only -->
            <div class="listing-layout">
                <div class="listing-images">
                    <div class="skeleton-block skeleton-img"></div>
                    <div class="thumbnails">
                        <div class="skeleton-block" style="width:60px;height:60px;"></div>
                        <div class="skeleton-block" style="width:60px;height:60px;"></div>
                    </div>
                </div>
                <div class="listing-info">
                    <div class="skeleton-block skeleton-line"></div>
                    <div class="skeleton-block skeleton-line" style="width:30%;height:28px;margin-bottom:16px;"></div>
                    <div class="skeleton-block skeleton-line short"></div>
                    <div class="skeleton-block skeleton-line short"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';
        const listingId = window.location.pathname.split('/')[2];

        function getToken() { return localStorage.getItem('vendly_token'); }

        (function() {
            const token = getToken();
            const authEl = document.getElementById('auth-action');
            if (token) {
                authEl.innerHTML = '<button onclick="localStorage.removeItem(\'vendly_token\');window.location.reload();">Logout</button>';
            } else {
                authEl.innerHTML = '<a href="/login" class="btn-primary" style="color:white;">Login</a>';
            }
        })();

        const categoryEmojis = { 'Electronics':'📱','Fashion':'👟','Books':'📚','Food':'🍕','Services':'🔧','Other':'📦' };
        const categoryColors = { 'Electronics':'#e8f0fe','Fashion':'#f0f7f0','Books':'#fef2e7','Food':'#fff3e0','Services':'#f3e5f5','Other':'#eceff1' };

        async function loadListing() {
            try {
                const res = await fetch(`${API_BASE}/api/listings/${listingId}`);
                if (!res.ok) throw new Error('Listing not found');
                const l = await res.json();
                const seller = l.seller || {};

                const mainImg = l.images && l.images[0]
                    ? `<img src="${l.images[0]}" alt="${l.title}" onload="this.classList.add('loaded')">`
                    : categoryEmojis[l.category] || '📦';

                const thumbs = (l.images || []).map((img, i) => `
                    <div class="thumb ${i===0?'active':''}" onclick="document.getElementById('main-img').innerHTML='<img src=\\'${img}\\' alt=\\'${l.title}\\' class=\\'loaded\\'>';document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active');">
                        <img src="${img}" alt="Thumb ${i+1}">
                    </div>`).join('');

                document.getElementById('listing-content').innerHTML = `
                    <div class="listing-layout">
                        <div class="listing-images">
                            <div class="main-image" id="main-img" style="background:${categoryColors[l.category]||'#eef1f5'};">${mainImg}</div>
                            <div class="thumbnails">${thumbs}</div>
                        </div>
                        <div class="listing-info">
                            <h1>${l.title}</h1>
                            <div class="listing-price">₦${l.price.toLocaleString()}</div>
                            <div class="listing-meta">
                                <span>📦 ${l.condition}</span><span>📍 ${l.campus}</span><span>📂 ${l.category}</span>
                                ${l.is_sold?'<span style="color:#e74c3c;font-weight:600;">🔴 Sold</span>':'<span style="color:#22c55e;font-weight:600;">🟢 Available</span>'}
                            </div>
                            <p class="listing-description">${l.description||'No description provided.'}</p>
                            <div class="seller-card" onclick="window.location.href='/profile/${seller.id||''}'">
                                <div class="seller-avatar" style="background:${categoryColors[l.category]||'#eef1f5'};">${(seller.full_name||'?')[0]}</div>
                                <div>
                                    <div class="seller-name">${seller.full_name||'Unknown'} ${seller.verified_badge?'<span class="verified-badge">✓ Verified</span>':''}</div>
                                    <div style="font-size:0.8rem;color:var(--text-muted);">${seller.school||''} · ${seller.department||''}</div>
                                </div>
                            </div>
                            <div class="btn-row">
                                ${!l.is_sold?`<button class="btn-primary" onclick="startChat()">💬 Message Seller</button>
                                <button class="btn-outline" onclick="makeOffer()">💰 Make Offer</button>`:''}
                                <button class="btn-outline" onclick="toggleSave()" id="save-btn">❤️ Save</button>
                            </div>
                        </div>
                    </div>`;
            } catch (err) {
                document.getElementById('listing-content').innerHTML = '<div class="loading">❌ Listing not found</div>';
            }
        }

        async function startChat() {
            const token = getToken();
            if (!token) { window.location.href='/login'; return; }
            try {
                const res = await fetch(`${API_BASE}/api/chat/start`, {
                    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
                    body:JSON.stringify({listing_id:listingId})
                });
                window.location.href = `/chat/${(await res.json()).room_id}`;
            } catch(e) { alert('Could not start chat'); }
        }

        function makeOffer() {
            const token = getToken();
            if (!token) { window.location.href='/login'; return; }
            const amount = prompt('Enter your offer amount (₦):');
            if (!amount) return;
            startChat();
        }

        async function toggleSave() {
            const token = getToken();
            if (!token) { window.location.href='/login'; return; }
            const btn = document.getElementById('save-btn');
            try {
                await fetch(`${API_BASE}/api/saved/${listingId}`, { method:'POST', headers:{'Authorization':`Bearer ${token}`} });
                btn.textContent = '❤️ Saved!'; btn.style.color = '#e74c3c';
                btn.style.transform = 'scale(1.1)'; setTimeout(() => btn.style.transform = '', 150);
            } catch(e) {
                try {
                    await fetch(`${API_BASE}/api/saved/${listingId}`, { method:'DELETE', headers:{'Authorization':`Bearer ${token}`} });
                    btn.textContent = '🤍 Save'; btn.style.color = '';
                } catch(e2) {}
            }
        }

        loadListing();
    </script>
</body>
</html>
