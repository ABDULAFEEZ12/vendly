<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Vendly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 14px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
        }

        .navbar {
            background: var(--navy);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--orange);
            text-decoration: none;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.75rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }
        .btn-logout {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.5); }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .profile-header {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--navy);
            flex-shrink: 0;
        }
        .profile-info { flex: 1; }
        .profile-info h1 {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px; height: 20px;
            background: var(--orange);
            color: white;
            border-radius: 50%;
            font-size: 0.65rem;
        }
        .profile-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }
        .rating-summary {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .stars { color: #f59e0b; letter-spacing: 1px; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2.5rem;
        }
        .listing-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            display: block;
        }
        .listing-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(13,27,42,0.06);
            border-color: var(--orange);
        }
        .listing-img {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: #eef1f5;
        }
        .listing-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .listing-body { padding: 0.8rem; }
        .listing-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            line-height: 1.3;
        }
        .listing-price {
            font-size: 1rem;
            font-weight: 800;
            color: var(--orange);
        }
        .listing-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .review-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .review-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1rem;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .reviewer-name { font-weight: 600; font-size: 0.9rem; }
        .review-date { font-size: 0.7rem; color: var(--text-muted); }
        .review-comment { font-size: 0.85rem; color: var(--navy); line-height: 1.5; }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <span id="auth-links"></span>
        </div>
    </nav>

    <div class="container">
        <div id="profile-content">
            <div class="empty-state"><div class="icon">⏳</div><p>Loading profile...</p></div>
        </div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';
        const userId = window.location.pathname.split('/')[2];

        function getToken() { return localStorage.getItem('vendly_token'); }
        function clearToken() { localStorage.removeItem('vendly_token'); }

        // Update nav based on login state
        (function() {
            const authEl = document.getElementById('auth-links');
            const token = getToken();
            if (token) {
                // Optionally fetch user name, but for now just show logout
                authEl.innerHTML = '<a href="/dashboard">Dashboard</a><button class="btn-logout" onclick="logout()">Logout</button>';
            } else {
                authEl.innerHTML = '<a href="/login">Login</a><a href="/register">Register</a>';
            }
        })();

        function logout() {
            clearToken();
            window.location.href = '/login';
        }

        const categoryEmojis = {
            'Electronics': '📱', 'Fashion': '👟', 'Books': '📚', 'Food': '🍕', 'Services': '🔧', 'Other': '📦'
        };
        const categoryColors = {
            'Electronics': '#e8f0fe', 'Fashion': '#f0f7f0', 'Books': '#fef2e7', 'Food': '#fff3e0', 'Services': '#f3e5f5', 'Other': '#eceff1'
        };

        async function loadProfile() {
            try {
                // Fetch user profile
                const userRes = await fetch(`${API_BASE}/api/auth/user/${userId}`);
                if (!userRes.ok) throw new Error('User not found');
                const user = await userRes.json();

                // Fetch user's listings
                const listingsRes = await fetch(`${API_BASE}/api/listings/user/${userId}`);
                const listings = await listingsRes.json();

                // Fetch reviews
                const reviewsRes = await fetch(`${API_BASE}/api/reviews/user/${userId}`);
                const reviews = await reviewsRes.json();

                // Calculate average rating
                const avgRating = reviews.length > 0
                    ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
                    : null;

                const stars = (rating) => {
                    const full = Math.floor(rating);
                    const half = rating - full >= 0.5 ? 1 : 0;
                    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
                };

                const html = `
                    <div class="profile-header">
                        <div class="avatar" style="background:${categoryColors[listings[0]?.category] || '#eef1f5'};">
                            ${user.profile_picture ? `<img src="${user.profile_picture}" alt="${user.full_name}" style="width:100%;height:100%;border-radius:50%;">` : (user.full_name ? user.full_name[0].toUpperCase() : '?')}
                        </div>
                        <div class="profile-info">
                            <h1>
                                ${user.full_name}
                                ${user.verified_badge ? '<span class="verified-badge" title="Verified Student">✓</span>' : ''}
                            </h1>
                            <div class="profile-meta">
                                ${user.school ? `🏫 ${user.school}` : ''} ${user.department ? `· 📚 ${user.department}` : ''} ${user.level ? `· 🎓 ${user.level}L` : ''}
                                <br>📅 Member since ${new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long' })}
                            </div>
                            ${avgRating ? `
                            <div class="rating-summary">
                                <span class="stars">${stars(avgRating)}</span>
                                <span>${avgRating} (${reviews.length} review${reviews.length !== 1 ? 's' : ''})</span>
                            </div>` : '<div class="rating-summary">No reviews yet</div>'}
                        </div>
                    </div>

                    <div class="section-title">📦 Listings (${listings.length})</div>
                    <div class="listing-grid" id="listings-grid">
                        ${listings.length === 0 ? '<div class="empty-state"><div class="icon">📭</div><p>No listings yet</p></div>' :
                        listings.map(l => `
                            <a href="/listing/${l.id}" class="listing-card">
                                <div class="listing-img" style="background:${categoryColors[l.category] || '#eef1f5'};">
                                    ${l.images && l.images[0] ? `<img src="${l.images[0]}" alt="${l.title}">` : categoryEmojis[l.category] || '📦'}
                                </div>
                                <div class="listing-body">
                                    <div class="listing-title">${escapeHTML(l.title)}</div>
                                    <div class="listing-price">₦${l.price.toLocaleString()}</div>
                                    <div class="listing-meta">${l.campus} · ${l.condition}</div>
                                </div>
                            </a>
                        `).join('')}
                    </div>

                    <div class="section-title">⭐ Reviews (${reviews.length})</div>
                    <div class="review-list">
                        ${reviews.length === 0 ? '<div class="empty-state"><div class="icon">💬</div><p>No reviews yet</p></div>' :
                        reviews.map(r => `
                            <div class="review-card">
                                <div class="review-header">
                                    <span class="reviewer-name">${r.reviewer_name}</span>
                                    <span class="review-date">${new Date(r.created_at).toLocaleDateString()}</span>
                                </div>
                                <div class="stars" style="font-size:0.8rem;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                                <p class="review-comment">${r.comment || 'No comment'}</p>
                            </div>
                        `).join('')}
                    </div>
                `;

                document.getElementById('profile-content').innerHTML = html;

            } catch (err) {
                document.getElementById('profile-content').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>User not found</p></div>';
            }
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadProfile();
    </script>
</body>
</html>
