<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CHANGE: Added viewport-fit=cover for iPhone notch/home indicator safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile — Vendly</title>
    <!-- CHANGE: Added display=swap to prevent flash of invisible text while font loads -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0D1B2A;
            --orange: #FF6B35;
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --text-muted: #6b7b8d;
            --border: #e8ecf0;
            --radius: 16px;
            --radius-sm: 12px;
            /* CHANGE: safe-area insets for iPhone notch/home indicator */
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* CHANGE: Global tap highlight removal and momentum scrolling */
        html {
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--navy);
            min-height: 100vh;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            background: var(--navy);
            /* CHANGE: safe-area top padding so navbar clears iPhone notch */
            padding: calc(1rem + var(--safe-top)) 2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.4rem; font-weight: 900; color: var(--orange); text-decoration: none;
            /* CHANGE: minimum 44px tap target */
            min-height: 44px; display: flex; align-items: center;
        }
        .logo span { color: white; font-weight: 700; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a, .nav-links button {
            color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.85rem;
            font-weight: 500; padding: 0.5rem 0.8rem; border-radius: 8px;
            /* CHANGE: GPU-accelerated, 44px minimum */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        background-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 44px; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation; will-change: transform, opacity;
            background: transparent; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .nav-links a:active, .nav-links button:active {
            transform: scale(0.96); opacity: 0.8; background: rgba(255,255,255,0.12);
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.08); }

        /* ---------- CONTAINER ---------- */
        .container {
            max-width: 900px;
            margin: 2rem auto;
            /* CHANGE: responsive padding */
            padding: 0 clamp(1rem, 3vw, 1.5rem);
        }

        /* ---------- PROFILE HEADER ---------- */
        .profile-header {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            /* CHANGE: responsive padding, softer shadow */
            padding: clamp(1.5rem, 3vw, 2rem);
            display: flex;
            align-items: center;
            gap: clamp(1rem, 2vw, 1.5rem);
            flex-wrap: wrap;
            margin-bottom: 2rem;
            box-shadow: 0 2px 16px rgba(13,27,42,0.04);
        }
        .avatar {
            width: clamp(70px, 15vw, 100px);
            height: clamp(70px, 15vw, 100px);
            border-radius: 50%;
            object-fit: cover;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--navy);
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            /* CHANGE: smooth fade-in */
            opacity: 0; transition: opacity 0.3s ease;
        }
        .avatar img.loaded { opacity: 1; }

        .profile-info { flex: 1; }
        .profile-info h1 {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }
        .verified-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
            background: var(--orange); color: white;
            border-radius: 50%; font-size: 0.65rem; flex-shrink: 0;
        }
        .profile-meta {
            color: var(--text-muted); font-size: 0.9rem;
            margin-bottom: 0.75rem; line-height: 1.5;
        }
        .rating-summary {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.85rem; color: var(--text-muted);
        }
        .stars { color: #f59e0b; letter-spacing: 1px; }

        /* ---------- SECTION TITLE ---------- */
        .section-title {
            font-size: 1.1rem; font-weight: 700;
            margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        /* ---------- LISTING GRID ---------- */
        .listing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: clamp(0.75rem, 1.5vw, 1rem);
            margin-bottom: 2.5rem;
        }
        .listing-card {
            background: white; border: 1px solid var(--border);
            border-radius: var(--radius-sm); overflow: hidden;
            text-decoration: none; color: inherit; display: block;
            /* CHANGE: GPU-accelerated tap feedback */
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation; will-change: transform;
        }
        .listing-card:active { transform: scale(0.97); opacity: 0.9; }
        .listing-card:hover { border-color: var(--orange); }

        .listing-img {
            height: clamp(100px, 20vw, 120px);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; background: #eef1f5; overflow: hidden;
        }
        .listing-img img {
            width: 100%; height: 100%; object-fit: cover;
            /* CHANGE: smooth fade-in */
            opacity: 0; transition: opacity 0.3s ease;
        }
        .listing-img img.loaded { opacity: 1; }

        .listing-body { padding: 0.8rem; }
        .listing-title {
            font-size: 0.85rem; font-weight: 600;
            margin-bottom: 0.3rem; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .listing-price { font-size: 1rem; font-weight: 800; color: var(--orange); }
        .listing-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.2rem; }

        /* ---------- REVIEW LIST ---------- */
        .review-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .review-card {
            background: white; border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 1rem;
            /* CHANGE: smooth fade-in */
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .review-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.5rem;
        }
        .reviewer-name { font-weight: 600; font-size: 0.9rem; }
        .review-date { font-size: 0.7rem; color: var(--text-muted); }
        .review-comment { font-size: 0.85rem; color: var(--navy); line-height: 1.5; }

        /* ---------- EMPTY STATE ---------- */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* ---------- SKELETON ---------- */
        .skeleton-block {
            background: linear-gradient(90deg, #eef1f5 25%, #e2e6ea 50%, #eef1f5 75%);
            background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px;
        }
        .skeleton-circle { width: 100px; height: 100px; border-radius: 50%; flex-shrink: 0; }
        .skeleton-line { height: 14px; margin-bottom: 8px; }
        .skeleton-line.short { width: 55%; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ---------- FOOTER ---------- */
        footer {
            text-align: center;
            /* CHANGE: safe-area bottom padding for iPhone home indicator */
            padding: 1rem 2rem calc(1rem + var(--safe-bottom));
            font-size: 0.75rem; color: var(--text-muted);
        }

        @media (max-width: 500px) {
            .listing-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">VEND<span>LY</span></a>
        <div class="nav-links">
            <a href="/marketplace">Marketplace</a>
            <span id="auth-links"></span>
        </div>
    </nav>

    <div class="container">
        <div id="profile-content">
            <!-- CHANGE: Skeleton loader instead of text-only -->
            <div class="profile-header">
                <div class="skeleton-block skeleton-circle"></div>
                <div class="profile-info" style="flex:1;">
                    <div class="skeleton-block skeleton-line" style="width:60%;"></div>
                    <div class="skeleton-block skeleton-line short"></div>
                    <div class="skeleton-block skeleton-line" style="width:30%;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Vendly · LASU's Student Marketplace</footer>

    <script>
        const API_BASE = '';
        const userId = window.location.pathname.split('/')[2];

        function getToken() { return localStorage.getItem('vendly_token'); }
        function clearToken() { localStorage.removeItem('vendly_token'); }
        function logout() { clearToken(); window.location.href = '/login'; }

        (function() {
            const authEl = document.getElementById('auth-links');
            const token = getToken();
            if (token) {
                authEl.innerHTML = '<a href="/dashboard">Dashboard</a><button onclick="logout()">Logout</button>';
            } else {
                authEl.innerHTML = '<a href="/login">Login</a><a href="/register">Register</a>';
            }
        })();

        const categoryEmojis = { 'Electronics':'📱','Fashion':'👟','Books':'📚','Food':'🍕','Services':'🔧','Other':'📦' };
        const categoryColors = { 'Electronics':'#e8f0fe','Fashion':'#f0f7f0','Books':'#fef2e7','Food':'#fff3e0','Services':'#f3e5f5','Other':'#eceff1' };

        async function loadProfile() {
            try {
                const [userRes, listingsRes, reviewsRes] = await Promise.all([
                    fetch(`${API_BASE}/api/auth/user/${userId}`),
                    fetch(`${API_BASE}/api/listings/user/${userId}`),
                    fetch(`${API_BASE}/api/reviews/user/${userId}`)
                ]);

                if (!userRes.ok) throw new Error('User not found');
                const user = await userRes.json();
                const listings = await listingsRes.json();
                const reviews = await reviewsRes.json();

                const avgRating = reviews.length > 0
                    ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
                    : null;

                const stars = (rating) => {
                    const full = Math.floor(rating);
                    const half = rating - full >= 0.5 ? 1 : 0;
                    return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - half);
                };

                document.getElementById('profile-content').innerHTML = `
                    <div class="profile-header">
                        <div class="avatar" style="background:${categoryColors[listings[0]?.category] || '#eef1f5'};">
                            ${user.profile_picture ? `<img src="${user.profile_picture}" alt="${user.full_name}" onload="this.classList.add('loaded')" style="width:100%;height:100%;border-radius:50%;">` : (user.full_name ? user.full_name[0].toUpperCase() : '?')}
                        </div>
                        <div class="profile-info">
                            <h1>${user.full_name}${user.verified_badge?'<span class="verified-badge" title="Verified Student">✓</span>':''}</h1>
                            <div class="profile-meta">
                                ${user.school?`🏫 ${user.school}`:''} ${user.department?`· 📚 ${user.department}`:''} ${user.level?`· 🎓 ${user.level}L`:''}
                                <br>📅 Member since ${new Date(user.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'})}
                            </div>
                            ${avgRating?`<div class="rating-summary"><span class="stars">${stars(avgRating)}</span><span>${avgRating} (${reviews.length} review${reviews.length!==1?'s':''})</span></div>`:'<div class="rating-summary">No reviews yet</div>'}
                        </div>
                    </div>
                    <div class="section-title">📦 Listings (${listings.length})</div>
                    <div class="listing-grid">
                        ${listings.length===0?'<div class="empty-state"><div class="icon">📭</div><p>No listings yet</p></div>':listings.map(l=>`
                        <a href="/listing/${l.id}" class="listing-card">
                            <div class="listing-img" style="background:${categoryColors[l.category]||'#eef1f5'};">
                                ${l.images&&l.images[0]?`<img src="${l.images[0]}" alt="${l.title}" onload="this.classList.add('loaded')">`:categoryEmojis[l.category]||'📦'}
                            </div>
                            <div class="listing-body">
                                <div class="listing-title">${escapeHTML(l.title)}</div>
                                <div class="listing-price">₦${l.price.toLocaleString()}</div>
                                <div class="listing-meta">${l.campus} · ${l.condition}</div>
                            </div>
                        </a>`).join('')}
                    </div>
                    <div class="section-title">⭐ Reviews (${reviews.length})</div>
                    <div class="review-list">
                        ${reviews.length===0?'<div class="empty-state"><div class="icon">💬</div><p>No reviews yet</p></div>':reviews.map(r=>`
                        <div class="review-card">
                            <div class="review-header"><span class="reviewer-name">${r.reviewer_name}</span><span class="review-date">${new Date(r.created_at).toLocaleDateString()}</span></div>
                            <div class="stars" style="font-size:0.8rem;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                            <p class="review-comment">${r.comment||'No comment'}</p>
                        </div>`).join('')}
                    </div>`;
            } catch (err) {
                document.getElementById('profile-content').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>User not found</p></div>';
            }
        }

        function escapeHTML(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        loadProfile();
    </script>
</body>
</html>
