{% extends "base.html" %}
{% block title %}Register - Vendly{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 2rem auto; padding: 2rem;">
  <h2 style="margin-bottom: 1.5rem;">Create Account</h2>
  <form id="register-form">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" required>
    </div>
    <div class="form-group">
      <label>School Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <div class="form-group">
      <label>School</label>
      <select name="school">
        <option value="">Select</option>
        <option value="LASU">LASU</option>
        <option value="UNILAG">UNILAG</option>
        <option value="UI">UI</option>
        <option value="OAU">OAU</option>
      </select>
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" name="department">
    </div>
    <div class="form-group">
      <label>Level</label>
      <select name="level">
        <option value="">Select</option>
        <option>100</option><option>200</option><option>300</option><option>400</option><option>500</option>
      </select>
    </div>
    <button type="submit" class="btn" style="width:100%">Register</button>
  </form>
  <p style="margin-top:1rem;">Already have an account? <a href="/login">Login</a></p>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
      full_name: form.full_name.value,
      email: form.email.value,
      password: form.password.value,
      school: form.school.value,
      department: form.department.value,
      level: form.level.value
    };
    try {
      const res = await api.post('/api/auth/register', data);
      setToken(res.data.access_token);
      window.location.href = '/dashboard';
    } catch(err) {
      alert(err.response?.data?.msg || 'Registration failed');
    }
  });
</script>
{% endblock %}
